body:
  text: 靜菴集卷四明張羽撰五言絶句雜咏空山無四鄰間扉映秋水時有負樵人唱歌白雲裏秋夜臥病清齊夜方寂臥病誰相親秋螢如有意殷勤來照人題蕉移得山後蕉種傍山前屋扶疏數葉開還如山後緑緑綺含風弱芳緘卷露新憶在間庭院婆娑映玉人題畫江水緑沉沉危峯倒夕隂何人倚髙閣月出聽龍吟白雲飛不盡青山斷復通澗道多機杼時鳴春樹中長松生夏寒野水淨人目借得相牛經閒來石上讀舟隨烟鶴逺行盡碧溪灣歸來北忩下寫得向來山一雨漲新緑雲開四山繞人掩蓽門深斜陽照江鳥高人自無偶獨向亭中坐日落山風來時聞松子墮落日四山繞空亭面面開白雲如有待山人殊未來澗路獨行遲閒雲逐杖藜欲尋泉落處應祗野猿知絶句荒村無四鄰茅齊深夜雨田犬時一鳴厨人時中語十載湖邊客何人伴杖藜登山臨水興惟有阿通知題萱佳人重生男競種冝男草東鄰有孀婦對花空自老塞馬圖弓劔隨身帶閼氏細馬䭾天寒水草逺更過白狼河陳火照紅雲龍庭戰未分全家上馬去應避李將軍重午四咏守宫艾虎百索辟兵符玉杵搗香酥試入來紅髓底用苦關防妾身清似水作僞欲成真獰猙門上挂若教鬼有靈看來應未怕千絲復萬縷向兒臂上纒教兒長夀命一寸一年年四海靜無塵干戈化縉紳兵符何用戴聊復應時新雜題我掩手中卷爾罷膝間琴相看坐成晚山水有餘音竿櫂每隨身情於白鳥親一簑江上老閲盡往來人岩雲餘輕素紅葉當風墮林亭江色多誰能來此坐雲寒鳥歸急落日千峯斂不見暮樵歸林扉靜中掩紅葉下秋浦歸帆未到家今朝五兩正直過長風沙題章舟隱畫扁舟小於葉來往橫塘裏為看青山多畫得青山似觀魏武紀有感促路蜉蝣短雄心日月長玉床飄繐帳猶自戀餘香題倭翁萬里扶桑國年年貢扇來皇都無酷暑賜爾拂塵埃山居七詠題畫送周伯陽盤雲陟危磴十步五回坐道旁無虎跡曾有遊仙過右遊仙頂秀出衆峯頂尋常雲霧裡上有萬年松食之令不死右白石塢澗路行將盡髙閣倚空虛月明萬籟盡空山聞讀書右茅塢空林無人行下有百年墓灑掃復何人蕭蕭白楊樹右崑崙山竹林路隂隂尋幽不覺深不比羊腸坂空傷行客心右九曲山偶逐微官去暫掩林中宅手種茱茰樹歸時髙幾尺右泠墳春風試茶處潭上葛花開去盡同遊伴傷心此獨來右月潭林臯秋色圖岩雲擁輕素紅葉當風墮秋色滿空亭無人來此坐碧岫晴雲圖嵐深山影寒樵響不知處緑樹早鶯時千峯一家住題竹幸逃斤斧憂獨抱風霜節時有饑禽來枝頭㺯明月四賢詩并引洪武十一年命天下郡縣修志書平陽魏公同知湖州實蒞其事舊志郡縣官惟守令有題名餘皆不録至是吳郡續志自僚佐以下皆得書焉其固為忠厚而不沒人善蓋如此他日又摘晉唐以來郡守之尤者四人為勝游圖以致其尚友千載之意云勝日罷書經揚舲出逺坰清流兼峻嶺應不减蘭亭昨别征西幕神閒務亦閒此中可髙臥何必是東山刺史放衙早輕舟泛碧池祗應官事了來寫放生碑聞道蘇灣裡蘇公舊此遊湖天風物好應勝在儋州寄方以常水竹小忩西新詩待我題相過雖不厭只怕踏春泥清晨眺髙閣積雨春陽晦望望君愈遙青山愁獨對六一泉醉翁去已久廢寺泉流圃朝來春雨深照見山雞舞蘇公堤冷落百花朝無人上畫橋東風吹緑草依舊舞裙腰保公岩青苔滿石龕隱隱砌趺跡想見夜禪深岩前雨花積寺所書所見蕩子秋未還雙蛾斂寒翠微步入蓮宫誰知此中意修廊行復怯風吹合歡帶小立避遊人佯對香爐拜蘭室五詠雜麝猶能别兼風更不分靜時還自得覔處却無聞右香秋風凋緑艷芳氣生來歇但使本根在寧愁蕭艾沒右根冒土紅初茁緣池緑漸縈道人偏愛惜不敢下階行右芽泛露光偏亂含風影自斜俗人那解此看葉勝看花右葉能白更兼黃無人爾自芳寸闕無不大容得許多香右花題畫孤村翳餘景秋風在空谷落日淡烟蕪坐看千里緑谷口人未歸凉風滿林樾孤村雲氣深千山雨初歇問徐道士病修竹閉雲房細路穿亂石如何塵中人來問仙家疾月潭試茶乞火從山婦臨流煮澗芳怪來泉味好併帶落花香水邊桃花何處惜春華芳桃水際花明朝風雨後流落傍誰家方園雜咏抱甕汲晨井灌餘烟景微獨坐卷修綆園芳猶滿衣右憩甕臺小坂平如掌春深緑草肥牛羊識家近日夕自能歸右牛羊坂北亭望南隩髙林懸薜蘿日莫烏聲急時聞勞者歌右南隩坐愛蘼蕪緑王孫罷逺游不似湘江上千里動離愁右芷徑故苑金溝斷荒園碧草秋南朝多帝澤曾向此中流右古溝采采不盈襜幽芳逐微步欲為公子裳敢謂行多露右采藍徑杖藜成獨往青林人迹稀日晏迷歸路翠實罥秋衣右蒼耳林舉頭見南山相去能幾里莫言不在山看山如屋裏右見山坡鄰近列仙居瑶林閟清境夜深明月來送過幡幢影右道林結屋連碧篠虛牖抱園開如何天上月移向壁間來右月牖園井汲寒緑當忩煮金屑應有山僧來從君泛春雪右茶宴室一壺兼一杖獨行東墺裏稚子倚柴門孤烟屋頭起右東墺戲呈金以貞以貞曾許香鼎因詩覔之性同韋刺史坐處愛焚香寶鼎并雞舌煩君早寄行寢齊夜咏沉沉寒夜裏寂寞有誰憐賴得忩間月猶能照獨眠題橫塘萱草用酒字韻酒號忘憂物花名乃相偶憂來對花坐何如飲美酒七言絶句題畫九疊屏前水倒垂古今唯有謫仙詩道人杖策窮源去寫得峯頭乍落時雙馭圖內官粧束樣能齊苑路春風信馬蹄共說放朝無一事看花直到夾城西悼髙啓燈前把酒淚雙垂妻子驚看那得知江上故人身已死篋中尋著寄來詩消息初傳信又疑君亡誰復可言詩中郎幼女今癡小遺藁千篇付與誰生平意氣竟何為無祿無田最可悲賴有聲名消不得漢家樂府盛唐詩絶句憑䦨兩客怨斜曛此日同吟只缺君江閣雖髙猶不見幾重山水幾重雲挽楊基恨不尋君未死前須臾離别便千年慰人幸有童烏在他日應能續太𤣥絶句青苔黃葉掩柴扉逺客無端夜憶歸林外月斜童子睡獨臨殘燭解寒衣夏雨新霽圖看圖憶得住山阿茅屋深深隱薜蘿風雨過來啼鳥靜白雲更比緑雲多題倭翁小國貢來東海外尚方分給午門前終身永保君王賜總遇秋風莫棄捐青宫甲觀倚雲開侍從如雲總俊才昨暮傳宣容握扇丹墀清曉謝恩來贈五河驛丞孫本驛樓欎欎古河濵日日征帆送使臣不共燈前一杯酒誰知亭長是詩人登韓信城望漂母墓繞城春水緑含漪遙憶沙頭澼絖時若愛當時一杯飯千年孤冡有誰知題畫二首千里生還不負期入門成喜復成悲忽看畫裏青山色猶道長干雨後時孤舟五月發金陵遙見家山喜不勝却憶石頭城上望白雲何處是吳興贈卜者老依卜市不論錢習靜年來白已𤣥安得相逢王輔嗣垂簾閒坐說先天暮過西崦白水泱泱繞壞堤隔林遙聽夕陽雞閒行每到東邊少為有青山在屋西題畫百道清泉石上流白雲初起亂峯秋此中疑有陶𢎞景髙臥松風第一樓舊是雲山自在身誤將書劍逐風塵犢車何日移家去還作條桑種杏人橫雲疊嶂圖丹崕碧嶂杳難攀臺殿高低積翠間試遣北人來看著多應說似洛陽山題畫贈長興杜典史濬其人曽任武昌肆射平其鄉里地名下若溪頭山似㦸武昌門外柳如烟何如肆射平其去束帶間耕墓下田題畫贈稅司吏緡錢算罷無餘事日日溪頭醒復醉長安七相并五侯何似吳興折腰吏夢中賦西施江上采荷花孔蓋如雲萬扇遮如今不敢人窺著昔日人看隘若耶重午回文輕羅扇試新詞好玉臂雙闕綵縷長清簟晝閒人鬬草午風微裊篆爐香寄靈隱良泐二長老兩禪相對一燈懸鷲嶺龍宫地悄然七百年來無好句泉聲空繞寺門前孟浩然雪竹圖雪滿秦京欲去遲故人當路謾相知平生多少驚人句却向君前誦怨詩劉伶謝安陶潛王羲之像鹿車載酒竹間期不記山妻泣諫時已識形骸為外物何須荷鍤鎮相隨典午風流數謝公髙標自許伯夷同桓郎跋扈苻郎健都在尚書雅量中五兒長大翟妻賢解綬歸來只醉眠籬下黃花門外柳秋光不似義熙前白葛為巾不裹頭蘭亭會裡最風流老來忘却觀鵝癖只愛山人許逺遊林下燒笋亂堆黃葉就林邊火力均時味已全日暮棲禽疑未下竹根猶自起殘烟題畫玉洞仙桃萬樹花樓臺倣佛蔡經家神丹煉就何曾服乞與山童飼白鴉月滿瑶壇露氣清三花樹底坐吹笙到門解說長生理只有茅家好弟兄題手畫雲山圖贈王生泰積善橋東舊宅間獨隨阿母住青山鹿車奉引行春去多在雲松九瑣間聽老人琵琶老來絲索久相違心事雖存指下微莫更重彈白翎雀如今座上北人稀梅雪軒山如東郭先生里屋似西湖處士家為問軒中清白吏還應比雪吐梅花雲山圖薜荔花開僧舍閒佛香時列竹忩間朝來小試南唐墨寫得溪南數叠山舟次孤山水繞荒山路半斜墓園無主屬官家我來正是梅開日滿目蓬蒿不見家最勝亭感舊絲雨微消紫陌塵湖光冷落似無春朱門記得曾來處楊柳青青不見人海㑹僧房床頭書卷緑牙籖病起名家手自拈氣息未回禪誦少猶能彈舌講楞嚴寄友客路尋常怨别離况逢秋色倍堪悲一封書到千山莫正是思君獨坐時哀宋君女阿歸客來喚出最鍾情暫别誰知便隔生昨日閩州書信到傷心猶有阿歸名曉發嘉興城烏啼散驛樓空一舸蒼茫曙色中不是故人今夕共定應愁絶雨兼風舟中聞歌何處清歌短更長渚風沙雨共淒涼不須直向天涯聽一日辭家已斷腸雨中想東園杏花齊居清晝四無鄰黃卷中間過半春落盡杏花渾不看少年人似老年人東園報杏花未開芳葩未拆避春寒日日煩君繞畫闌莫是主家曾見慣含情欲待外人看懷黃野得疏散元非用世才日髙林戶尚慵開為憐湖上青山好行到冬青樹底來孟浩然像橫門雪滿放朝回油壁金鞍覆地來誰是蹇驢烏帽客解吟花逼艷陽天頭陀菴聰道者房苦行能便自小持松龕寂寂到人稀齊厨日晏孤烟起童子新將施米歸題淵明白衣送酒圖幾回笑把菊花枝遙望南山自咏詩不值白衣人送酒豈堪懷抱獨醒時寄題蘭室柳湖歸隱圖挂冠歸去祗看山心寄孤嵐野鶴間試數同時戎馬客幾人投老似君閒寄蘭室離思逢秋自不勝忽看書札恨翻增遙知雨絶林塘靜獨坐髙齊似定僧又行人共識孝亷家流水當門略彴斜日日髙堂稱夀罷倚欄間看紫荆花題徐賁畫南浦亭圖離離烟樹接通津南浦亭前碧草春客裡見圖先淚落只緣身是此鄉人靜菴集卷四
