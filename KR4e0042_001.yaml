body:
  text: 靜菴集卷一明張羽撰五言古詩擬古后皇有嘉樹受命生南國謬承雨露恩結根非一日如何遊間子攀條摘其實一摘已自傷況乃再三摘清霜凋緑葉榮枯良未測今日上客至置酒臨前楹絃歌四座起中有擊築聲此曲誰所為絲急調不平竊聽不敢言下流人所輕回視匣中衣感德涕縱橫雜擬二首雍雍池中鴈飲啄得其時夕息藉芳蓀朝遊蔭階基仰視雲間翼嗷嗷西南飛朔風摧羽翰嚴霜下霏霏辛苦萬里道所免寒與飢倘埀終養惠豈樂衡陽栖朝出上東門遙望北邙墳悽悽挽者歌咽咽喪車輪旌竿日日滿碑碣朝朝新昨來送葬人忽奄及其身朝為席上珍暮為泉下塵唶哉當路子為樂須及辰有金不趣賣當為誰所吝雜詩并序豫屏處間默久絶篇章維時新春偶感歲月慨然興言既度自課成帙輒書之以見襟抱隨事為篇雜出無倫題曰雜詩其一青陽萌始節萬物咸光昭我亦動新懷晞髮起晨朝俯覽手中鏡仰看枝上條枯卉有再榮華髮行已焦總角服遺訓老大望愈遙不傷華髮衰但恐志氣消業成在永久期之於後凋其二右軍懷逸民向平悟易卦如何不決去皆云待婚嫁區區兒女情逹士何足挂我今履其境此語不深訝嗟豫喪鄉土舊業廢耕稼連蹇五九年玄髮忽已化一女首甫笄兩男肩相亞依依向父情欵欵接言話素懷歸衡廬顧此豈遑暇寒雞翼其雛鳲鳩均上下物性猶有然人情諒難舍何當携幼稚盡室騰逺駕其三蜀嚴好沉冥日食止百錢卜筮人所輕久幽操彌堅君子有所貴乃不在當年百歲有知音何如鍾期然子雲太區區譽聞公侯間卑哉益州牧乃欲吏髙賢豈無君侯貴敢見不敢言斯道誠兩得永為後世傳其四此邦非吾土寄迹聊在兹旅食何所營亦復假耘耔玄夏苦霖潦良苗奄離披至今畎澮間餘波渺相思行恐春澤盛耕墾失其時共虞斯人艱豈獨念吾私先師有遺言耕也有時飢且當竭所務天道非我知其五昔豫居南山樂有同心人形迹不暫乖棟宇復為鄰有酒更相呼得粟還共分時時榛曲中相携誅荆薪兩賢不相猜所貴得其真一朝各異路隔涉吳與閩拙宦失其宜薄責恆苦辛慈母抱沉憂興言涕盈巾昨者訪故廬松竹稍或存依依親舊迹戚戚感良辰命駕欲相求風波限通津尚想古人交俯仰愧此身其六士有避世者高居浙河源王室方橫潰斯人獨高鶱抱瑟倚衡門清風拂朱絃舉世莫能屈乃獨詣任延掃門愳為辱尺牘情屢宣道義有相激權位非所先周公下白屋斯禮自古然區區功曹檄何足致高賢其七生平頗愛酒未嘗自斟酌一與佳賔遇陶然不復却雖得一醉歡傷生莫自覺况復多謬妄空為俗所薄靜言思利已一止良不惡東鄰有父老顧武忽大噱與子共秃翁忍棄豫中爵酒為損榮衛多憂正相搏呼兒流新釀且復共酬酢醉罷各相恕誰能責狂藥其八青青女貞樹霜霰不改柯托根一失所罹此霖潦多高枝委為薪落葉掩庭阿弱柳對門植秀色一何佳物性固有常變幻其奈何其九伯鸞舂吳市伉儷乃相之布衣日操作椎結無容輝居貧敢忘敬舉案與眉齊斯人亦何修感彼糟粳妻買臣躬負薪室家請長辭豈惟匹婦醜君子諒有虧周道興閨房衽席豈為微所以冀缺耨重耳任不疑斯道久寂寞捃托為此詩其十余生憚逺役旅寄百里餘自從去家來歲月忽已除緒晏人事迫卷帙還故居揚艫發東臯挂席指西隅且從家私務暫與友生疏渺渺遵溪渚行行入吾廬依依携童弱藹藹會里閭啓扉玩東園緑葉榮廢蔬採之侑春酒數酌忘飢劬但苦宿潦荒美秫無舊儲猶當望來稔尊中長不虛空名百歲後此事非我須其十一抱拙衡門下久矣忘鳴琴凝塵翳其徽絃絶調亦沉時還置我膝命酒聊自斟髙歌出金石拂拭趣已深酣來枕之臥冥此千古心吾亦忘吾耳何事有聲音雜詩戚戚多憂思悠悠悲夜長攝衣坐忩間仰睇明月光明月有盈虧軌度豈無常南箕與北斗萬古不更張人事有大謬天道信茫茫泠泠山下泉汨汨谷中源中有雙鯉魚浮遊戲波瀾江漢豈不深欲往道無緣風雲諒難遇栖栖守故淵但恐勺水枯終為漁者憐感此令人悲置身良獨難懷方員外彛丹霞散淪隂皓月出東山驚飈鳴髙樹飛鳥繞林間攬衣起徘徊白露浩已團豈無一樽酒慰此中夜寒良朋邈已逺獨酌豈成歡薰蕕不可和膠漆不可解自非同心交誰能久不改立秋日早泛舟入郭連霖啓秋期金氣晨已兆清雲合餘隂水霞相照耀登艫泛涼風乘流駕奔峭回舟蕩塵襟青山列逺眺蒲菼迷森沉菱荷爭窈窕沙明衆女浣潭淨孤漁嘯端居積塵憂暫出窺衆妙好爵豈不懷衛生乃其要寄謝滄洲人豫亦堪同調遊戴山雲羅橫四海田野無遺英尚賴二三子共怡山水情煦煦新陽動寥寥天宇清昔人稱四美兹晨遂成并前登高丘阻遙睇澄湘明慿林招逺風松檜自成聲俯仰天地間微軀良不輕安能自羈束坐使衆纍縈處賤足為貴抱素詎非榮逍遙解神慮庶以適吾生雨後戴山遊眺偕黃孝廉陳茂才積雨限遊步超然懷逺觀雖微千仭岡孤岑且流玩冀展東山望一寫川上歎如何方此時氣霧欎未散玄雲蔽白日八表洞漫漫川原近莫覿安能闕雲漢耳目既罕適沉憂將何緩感兹一以悟滯景中自亂內照苟昭曠通蔽非所間由來君子道尸居或龍見伏雌乃默化何必收搖翰去矣齊物變卑栖永遺患和答童中州皇情春樂育建官宗聖黌秩微道則重人欽化乃行若人婺女秀經義宿所精辭歸旋楚闕祗版赴霅城鄭公論墨守董子著清明摳趍仰賢範圜橋聆德聲跂豫望已久覯止願未并誰謂在頖初遽申伐木情偕彼四三子乘流造柴荆傾蓋略宿晤盍簮慰中誠草具豈為禮所欣接光榮恭承宴集篇華采燦若英盛德多自負誰敢下後生簡年子先施仰高余闕盈愧余避事來久矣廢將迎豈不懷旦暮絅然限音聲形神交靡間心照數自輕斯章擬成報七襄徒空名初至西林喜遇幼文與君三秋别成此一會期清言美無度離緒忽相遺况復在丘園俱無冠帶縻逶迤下田遊皎潔艷陽時桃紅媚墟囿牟緑遍川坻覆觴申宿戀開帙問新知澄懷悟淵泳脫迹仰冥飛幸同賞心遇白首永無違懷古生平慕遊俠驅馬遍東周周人重千金所遇非我儔撫劍登泰山歷覽魯與鄒小儒事絃歌齪齪安足由北臨邯鄲道平原曠悠悠常聞虞卿賢斯人不可求悲哉窮途士緩急將焉投招隱徇名趍華闕逐利居市㕓山林何所事有道在丘園結構依巖穴緑蘿蔭門前鵾雞巢高棟猿猴戲庭間仰睇大壑隂俯咏聖人篇薇藿以充虛裋褐聊禦寒場苗豈不美白駒逝翩翩鹿鳴有旨酒我思在寒泉雜縣愁鐘鼓物性有固然長謝囂塵外逍遙養餘年題娟靜軒緑竹有異質夙著風人篇猗猗瞻淇隈籊籊懷衛泉拾遺美形容復有娟靜言微植被將飾麗句永流傳若人同所尚掇辭以名軒攢玉矗森森總翠鬱芊綿鮮標貫寒日密葉冒清漣遙想佳雨餘靜對罷鳴絃濡翰傳霜節搦管象春妍聊探詞人妙默寄圖繪宣逝將泛濤江息駕依名園攀枝掃石月憩隂濯寒泉雖微求羊髙請附嵇侯賢緘詩存所欽纒繫日為年聽香堂粲粲歲寒花幽香靜中起人皆待三嗅子獨受以耳輯彼瓊瑶白長謡自為喜聲中豈無香聞覺無異理更願息聲塵色香同一委無聞亦無聽冥然混沌始寄題北山堂雨罷寺樓曉曲堂秋樹間暫輟今朝講一玩北湖山仰瞻上方雲遙見林屋關飛淙盡日雨流禽先暮還即境知妄迹觀空怡妙顔余乏道門舊阻陪高坐間馳詠終非侣當兾一追攀題陳惟允臨刑所畫若人悟縣解委蛻順天刑慷慨赴東市一日為千齡李公悲上蔡陸子喟華亭識機苦不豫逹生良可經朱絃亦易絶仄景不可停從容灑芳翰炳煥若丹青妙藝永傳世精魄長歸冥披圖懷平素清淚緣襟零奉答吹臺先生送蜀山人見簡之作若人辭天階消搖寒江汜言送將歸人復念中林士殷勤吐芳藻綢繆寓深旨文虹被林薄簡珠照泥滓子畏伐檀刺余懷白駒美道同無殊轍神交有妙理索居序已積孤遊情難委寫心酬妍倡怛焉愁下里大雨山中作重隂翳秋節霖潦無時作虺虺伏雷震浩浩洪湍落浮槎懸修磴湧泉淹髙閣禾黍浩縱橫良疇殫為壑頽梁斷來術垣閭增蕭索塊坐空堂上展卷莫為樂雖微農夫憂內顧無儋石先民有遺言君子貴處約抱關非吾事嗟來非吾食去去遵時命南山有薇藿題畫吾愛陶𢎞景開忩玩白雲白雲自舒卷青山無垢氛清耳延松籟齋心閲瓊文問道虛皇老結客古茅君靈藥青童種名香桂女焚萬乘遙致敬三尺久離羣丹成上鶴去棄俗等拏紛斯人不可見斯世亦徒聞我獨懷仙契千載仰清芬節婦詩行者不復歸處者長相思昔與君别者乃為大暮期杲杲白日光其雨在何時惟有明明月可以比容輝兔絲附女蘿窈窕不相離青青忽已稿纎纎難自持他山豈無木林木豈無枝念彼綢繆好甘隨秋草萎感兹以終老鬢髮已如絲耿耿柏舟誓千載同所歸戴山石上聽松風偶詠溷耳俗喧久兹晨一清聽長松遞鮮猋哀壑互相應奔騰駭濤瀨窈渺韻笙磬至音不假器始覺自然勝緣觸故成聲動極還歸靜此時憩石坐默然待其定乃知棄瓢者未悟間中性三月三日期黃許二山人遊覽不至因寄曜靈無停機四序互相更惟有暮春節在昔重其名姬旦城洛邑多士方來并羽觴隨流波逸詩存遺聲秦王臨河曲髙會列簪纓金人奉長劍夷夏俱來盟偉哉霸王業小人非所營獨愛晉諸賢流風有餘清亭前列茂樹修竹蔭崢嶸幽蘭文緑坂流湍左右鳴濟濟少長集鮮鮮春服明中有王與謝文筆冠羣英緣坻玩流轉列坐無所爭觴來不復停篇翰隨意成一醉逹天和曠然遺死生俯仰宇宙內何物纍其情我欲效斯人兹晨且遊行如何千金諾翻自意所輕歎去愁方結望來念徒縈良遊誠難遇默默掩柴荆春日陪諸公戴山眺集暮入兆麓得石床岩洞諸勝張宴凌山極返策揭澗隂南岑夙厭歷北麓今始臨危磴絶來術崩壑瞰空潭幽竇抱虛白哀牝遞清音旁探闖窈窕側坐倚嶇嶔古苔文已駁春蒲茸漸深幽禽鳴相續驚麌竄莫尋扳蘿罥修袂折蘭芳素襟竒蹤閟自古勝賞發豫心雖微舞雩詠敢諧溱洧吟山河永襟帶微生終陸沉愧乏古人操將何視來今余扁所寓山堂為清晏蓋摘右軍帖中語也蜀山隱君為書三大字刻著楣間林壑增勝因而成詠少年未識事冠帶逐時流一悟名為妄悠然返林丘假此精舍居蕭條岩徑幽竹樹共清密川澗屢環周高峰延新旭華棟鳴晨鳩晞髮東軒下羣書散不收嘉名余始製妙翰若雲浮況有同心友觴詠接綢繆始來適朱夏今已踰素秋謬處山水宅慙非仁知儔耽玩昧出處栖泊愧淹留誠知非吾廬且得性所求於書簏中得吹臺所寄詩遺稿拂塵啓敝篋忽覽故人詩撫迹疑若存驚逝杳難追憶昔吳苑遊文采衆所推名談析妙理華襟吐芳詞子時曾城北高闕臨清池焚蘭延佳月對酒彈清絲誰云茲夕歡乃為千載期冥漠遊魂逺凄涼親翰遺墨塵尚留闕紙敝猶含滋玩此塗灑澤想君哦詠時華章未及振厚意良已虧收竟一長慟林風響余悲想當寫寄日兹感君詎知沈集自錢塘歸作此示之錢塘昔所遊形勝此邦最尚想鳯凰山飛翔落天外胸吞滄溟寬江水渺如帶海門豈天設屹立兩峰對汐潮類臣妾朝暮屢進退羣峯闕明湖浸淫百川會不意玉女盆居然墮闤闠崔嵬白塔寺零落闕宋內荒階與斷礎龍鳯紛破碎昔聞亳社屋厭鎮信可怪豈徒鞭荆尸戮辱極狼狽妖僧固可醢國家豈無罪雷師秉炎火楚蕩意頗快至今遺民過涕泣行且拜爾遊何草草吊古須我輩落日望東南臨風發長慨懷景佺師旅宿厭卑喧愛此僧居靜蓮宇已摧頽茅齋自清迥山光林際來野色雨中淨池水不生瀾袈裟坐相映纍日滯幽尋緑苔應滿徑寄杰上人想望東西陌共掩林中扉誰言儒道異闕善理同歸昨欵精舍遊步經園徑微高垣夏木繞緑隂生晝扉振錫還山去空壁挂禪衣何意幽栖侣佳會亦相違離合兩俱安去來寧有依棾空自足遣了此人我機答黃孝廉雨中見寄飛雨灑門閣庭溜夕已深涼飇驚幽幔秋氣薄單衾暝壑無霽色寒蛩多苦吟室家曠修渚朋知阻遙林離羣易成咎獨處難為心賴此几上書闕能獨幽襟念子懷癙憂豐蔀方滯淫遺我愁霖唱要我西山岑闕未遂陟旨酒思共斟毋憚沾衣苦傾耳遲拿音贈道士吳秋雲飄飄三素雲鬱鬱秀玉標清明合九氣髙遊冠神霄凝化淪無迹廓落乘素飇停隂希甘澍灌溉興庶苗冥真無去留靈根永不凋真人保黃寧精鍊五濁消控駕浮玉洞飛裙歘煙飄吾英回黃旗司命講洞謡淡遊何方所享此年劫遙舟中朝發戴山岑夕逗金溪瀆雲天方憀栗川途屢回復帆駛岸疑轉棹奔山似逐鷗鳥隨波泛霜澌含苔緑依依浣女影嫋嫋榜人曲采竒忘來遙耽勝成往速恱生良可懷徇名非所欲請識孺子歌去矣從我獨寄吳隱君若人藴真趣飄飄懷古仙振衣入逺嶽順風祈一言寂歷微妙韻精明天老篇清亝和玉齒焚香禮軒轅九咽華池液七返流珠丹頥性得天和齊物同化先五芝非吾茹聊以蘇世癲神期茍冥會飛步升九天抗迹遊浮丘麾手招偓佺下視倉扁流永為塵網牽詠齋前紫薇花彼美掖垣秀遺此荒園中賦質非有異置身偶不同屢供樵㸑餘生條幸不窮蒙蘢委榛莽灌溉鬨人工謂同衆卉棄忽有孤花紅闕長不擇地始知元化工褰衣繞清癯輕香散晨風似感幽士知芳意默自通一聞清露翻預恐綵雲空等是榮謝理何待植南宫題倪雲林竹枝南州有高士乃在延陵東清時不肯仕滅迹雲林中拂石坐蘿月弦琴寫松風焚香坐黃老望雲送歸鴻門車常自滿尊酒無時空乘興面滄洲古人未為工干戈困末路白首隨飛蓬名山乖始願羈遊無所終賴有車武子能哀阮籍窮傾壺醉陶令避堂延蓋公流俗輕髙賢貧賤困豪雄孤鳯混雞羣野鶴摧樊籠豈無梁鴻徒不聞臯伯通吾將傳遺迹清芬千載同送許尊師還大滌洞青山九瑣處白髮一龕居清齋誦黃老不閲世間書餐霞養真氣對月禮空虛暫來流水地應與孤雲疏遙知還山日仙壇春草餘玄覽堂亹亹遊氣運森森萬有羅窅然玄中求理一非有他存心冥靈府洗胎濯百邪衆妙體常寂豈知形迹多譬彼明月輪總攬諸山河團團霄中澄默默至幽遐又如大海淵潛凝韜衆瑕中有徑寸珠炯炯曜玉葩間黑歸明月應感無偏頗髙觀衆甫表不樂將如何由竹溪至梅溪偶成途中出門懷清曠入舟若炎熾皇天從人欲飛雨颯然至風吹波上寒凄其感秋氣暝投山僧眠復得清淨地舟人候明發徒侣不得遲泝流多杜渚篙楫頗告瘁雖微三巴險事與五盤異聞昔天目頂靈物久潛閟一朝赴大壑怒折崖谷碎回頭顧其兒首尾屢相值至今此溪水斗折七十二世逺衆喧傳茫昧竟誰識但欣秋濤壯水物俱得志我何憚行役沿洄領佳致鷗鳬泛淡濫菱蒲蔚蒼翠人煙亂餘集茅屋若棊置之子住河漘相望勞夢寐每怨川無梁握手今可跂憶昨訪我初茅亝夜深閉扣門滿衣雪僵立不得跪移燈具雞黍濁酒寒不醉同來鄭廣文清瘦凛欲睡絶勝王猷戅返棹何太易兹行冒暑雨古禮尚報施逝將𣟵輕橈待子思共濟散髮乘長流埀竿釣清泚虛舟總超越萬里誰能繫恐此未易期臨川一長喟題席上墨萱扇團扇復團扇團團三秋月上有宜男草可玩不可折宜男何足貴能令憂作恱憂思既可忘為君忘炎熱無障西風塵汙此皎如雪贈醫士劉子中伯休無二價長房惟一壺真隱不在山何必去京都通籍遊金閨觀化眺神區搴蘿采石肉潛波攬江珠焚香降天老稽首皇農書製之軒光竈湛然粗穢除含精就日養輔世事其餘起遙龜鶴年高眄凌桑榆哀哉倉扁徒忘已要名譽當年不自保千載回翳如觀習禮神樂觀歸時有作維皇恭明祀卜郊時再陽指期戒先事習吹誦故章竹宫儼清閟羽佩溢中堂蕝階羅舞鉞著位表官行升歌出睿藻妙奏發清商臚音速逺響華鐘泛髙張虛罍待實醴薦璧願承筐想兹天步臨穆若垂景光駿奔貴有恪報説永無疆豈同交門享恍惚事神方揆余承人乏具寮慚奉常兹焉陪羣彥會此靈畤旁執禮素寡術敕躬何敢忘愧無安世歌徘徊望齋房贈胡若海胡葉兩才子束髮好從戎棄書去學劍聫翩行伍中論兵舌吐火見敵耳生風連鑣度狹邪接席醉新豐萬里逐輕車十年無戰功歸來投文吏相顧各成翁知命故無怨為儒豈不通聊復釋短褐從兹事章逄君恩承見收吾道未終窮乘軺九真界策馬三晉衝一身隨簡書分散如飛蓬嚴秋九月天握手此相逢垂楊欲生肘浩氣猶填胸却話向來迹恍然醉夢同一贊少昊司出入蓬萊宫一佐青陽宰絃歌百里封人非鳥獸羣焉得長相從換酒金陵市分袂新亭東高歌清驪曲笑拂寶劍鋒致身貴勛業泣别非英雄石城接秋浦九華應茅峯欲寄碧雲句中有雙飛鴻人間人間白日靜鳥鳴高枕餘階筠初過雨忩風時㺯書已無車馬迹適似田家廬即此何足戀性自樂幽居雨中試筆門徑素來靜雨中人更稀山禽時一囀田雉每雙飛客散罷琴宴心間清道機南山有佳色相對共依依山中送悟淡隱君還蜀山春山有佳趣纍日同遊寓我為采薪留君先拂衣去竹翠落間階鶯聲出高樹空館愁獨歸依然携手處懷舊我有一區宅寄在匡廬山香爐起户外瀑布落簷間梅老花空發草芳人未還恰有藤蘿月夜夜照松關夜坐間門催閉早日落古垣深移床傍秋草對月聞高砧角巾清露氣華觴淡夕隂毋言怨遙夜幽獨故豫心獨夜聞雪亦知雪意就向夕足寒雲茅山夜自掩孤枕夢回聞暗飛方瑟瑟睡起看紛紛却憶梁園客既醉復能文雪後夕齊衆禽歡殘陽照山雪徒令掃幽徑依然人迹絶緑尊時自命寶書誰共閲默默待歸期故園寧久别郭上舍讀書處蟲鳴縣齋晚月滿杏花壇散帙夜方半下帷人獨寒屢看孤燭換詎聞清漏殘擁衣待中旦雜珮已珊珊寄金許二文學輕雛始揚幕新篁稍闕林非關杜來迹苔徑自無塵獨以靜為賞彌懷心所親倘畢東臯務一來存故人題春山瑞靄畫扇鶯啼山雨歇前川緑正繁人家在深樹雞犬盡無喧淡淡流水意依依田父言即此堪結廬可以傲華軒松竹軒曹務局終朝齋居暫休沐松隂生晝寒竹色連苔緑懶從醉吏喧時對髙僧宿毋將簿領來穢此山林躅潭上偶詠回澗曲如月泠然緑樹根雲山自幽寂水石共成喧靜觀因悟性耽聽欲忘言何由駐塵駕迢遞一尋源寓徐給事宅觀舊所植竹樹愴然有懷君為金門彥我向故山來芳樹繞庭緑猶是去時栽寢閣鋪餘馥賔位滿青苔孤賞誰為樂園花空自開題采苓子卷春山靄衆緑靈苗何處尋孤芳不自掩迢遞入幽襟搴條繁露散濯根寒澗深持此當朝茹潘齋延道心送莫文闕入郭却還溪居舉世皆如醉何人獨愛才余雖識君者相對亦徒哉落日收書卷涼風送酒杯紛紛俗中惡空谷遲重來蟬鳴山郭晏一棹出煙扉涼風將皓月迢遞送君歸自識門前樹遙聞忩下機應歎緇塵滿臨流一浣衣雨夜寢閣去門逺春雨荒園夕誰謂在人境宛似空山客禽歸暗竹喧風斷疏鐘寂戚戚寡歡悰良宵端可惜雨後望西山懷子竹色恱朝雨鳥鳴人正間手持白羽扇遙詠西樓山企彼巢居士髙臥石林間團團青桂樹歲晏待豫攀舟中望佛燈精舍懷南洲長老蕩舟西陂上望山懷逺公遙知覆衲臥雪屋一燈紅事殊迹暫曠神交理自通維當待歲杪期子白雲中曉起新寒人獨臥寢扉風自開向無羈旅念秋思亦佳哉曙禽翻暗竹白露㵼青苔欲賦幽居意對景每難裁過白馬湖沿流信歸棹漸與青山逺遙見鸊鵜飛靡蕪春尚淺空嗟心愛離莫緩愁腸轉不對芳尊酒紛思終難遣紀行詩洪武十五年臘月奉旨乘驛往鳯陽祭皇陵舟中作龍江灣玄天無烈風江水日夜清馳波渺東注回流抱神京至哉鍾水德乃以龍為名舟檣萬方合雄麗殊百城昔云天塹險今為衣帶縈山川迹不改人理有代更下馬入官船兹焉始孤征祀事有常期中心念王程俯視萬仭淵不啻溝澮平涉川古所戒事重軀命輕觀音山連山爭南馳劃斷滄江曲勢如萬馬奔鞭鐙忽回復石角不戴土蒼然四無麓寸草不得榮唯含古苔緑浪波撞其根岩竇響琴築浮圖乃善幻凌虛架佛屋行人願利涉望拜各致祝人生貴心事安能慮存覆我欲升其巔慿高快心目飛傳不可留一往如電速竹篠凍雨不成雪客闕利新晴回睇三山外殘陽靄餘明江神不揚波歸流淡且平使者誠宣德國家有威靈笳鼓發中州棹謳悲且清釃酒凌長風篇翰倐已成嘗讀皇華章征夫任匪輕愧無咨諏效何以答皇情金山門兩山夾滄江拍浮若無根利石侔劍戟風濤相吐吞維天設巨險為今國東門試將一葦守堅若萬馬屯我來及清曉天空霜露繁列宿森在水北斗若可援江光合海氣溟涬神理存俯視不敢唾中有蛟龍蟠浮屠者誰子髙居凌風幡不見渡口人擾擾蜂蟻喧愧彼超世士去去將何言𨝍溝衰楊夾髙房北風暮颼颼隨逢長老問會言是𨝍溝相傳開鑿初民勞天為愁至今濁河底時見白髑髏陸通梁宋郊水漕荆吳舟渠成萬世利慮始難為謀至今南北交此土為名州飛閣跨通波張幄如雲浮憶昨少年日寶馬珊瑚鈎經過劇季輦結把金張儔醉月瓊花觀徵歌明月樓羅綺朝還暮笙竽春復秋繁華逐逝水一往不可留向來歌舞地茫然狐兔丘家老無兒孫杖箠驅羊牛少小心尚爾不知今白頭欲從亂離説恐子增離憂長揖入門去客淚如絲流髙郵城茫茫髙郵城下有古戰場當時奐鹽子㺯兵此跳踉燕師掃境出供餽走四方長困西百里旌甲耀八荒勢如泰山頽一卵安能當驕將存姑息頓刃待其降兩機不容髮豈暇慮殺傷一朝謗書行將殞兵亦亡唶哉三里城百萬莫與亢鹿走命在庖終然屬其王空餘菩薩臺落日風沙黃清口豁達兩河口前與黃河通髙岸忽斗折清淮滙其中甘羅城在南韓信城在東一為秦人英一為漢家雄人生有不死所貴在立功方其未遇時鹿鹿何異同時命苟未會丈夫有固窮舍舟登髙防歲暮百草空坡陀隴畝間一二老病翁遺迹不可問但見荒榛叢行行重回首目斷以飛鴻龜山輕舟泝淮流千里不見山披衣起清曉忽覩青孱顔始覺客愁散頓忘行路艱安得策飛笻一造幽人關翻思在山日千岩厭登攀物少乃足貴不在闕惡間役夫告我言此下棲神姦噓氣成江河須臾駕岡巒僧伽大威力困彼一鞠慳石岩下無底繫以千連環至今風濤夕猶聞響珊珊茫茫淮泗流禹功不可刊傳竒乃善誑此語當重刪作詩紀岩石庶以開愚頑三江口望京闕凋年赴陵邑稚景懷京闕引領鳷鵲觀言歸桃李月緑蕪滿芳甸青山麗佳節沙氣已含春柳意方辭雪征夫方邇止同心仍阻絶迍空庶無遺賞勝聊自悅吾其和天倪將從莊令説題雲山圖八首煙霏亂晴旭遙見西林山憶歸東湖逺人家春樹間荆扉映水掩應待龎公還坐愛西山翠手版方支頥白鳥逝如彼孤雲淡若斯誰能間料理空滯還山期郢水不可極荆門望漸微青山將落照偏映酒家扉漁梁夜爭渡知是醉巫歸潮落寒沙廣蒼然逺山暮何處罟師歸自識門前樹披圖憶所歷仿佛松滋渡參差緑樹短窈窕花源明白雲若可攬山鳥時一鳴遙羡中林子遲遲南澗行猿啼楚山晚雲生冒洲渚返照入澄江風吹半峯雨中有逺行舟悠悠待徒侣寒煙逺輕素斜日在高峯但聞猿鳥響更無塵土蹤山僧暝投寺迢遞來清鐘南山隔秋水秀色空在眼褰裳不可涉臨流思無限孤舟肯相濟寧辭去人逺題松下讀書圖幽栖出塵表空翠連松竹袖得碧苔篇間來石上讀日暝欲忘歸山空人轉獨潯陽張羽題吳興莫翥所畫松下讀書圖奉贈正卿高士登桐塢後岩牽蘿陟雲崦憩此盤陀石欲去更題名淋漓蘚花碧定有樵夫來怪是龍蛇迹山中答武康徐髙士寄書久别得君書開緘散吾慮不寄山僧來何由知我處剪紙答君書還寄山僧去為問片雲間何時一相遇暮歸聞許文學枉顧悵然有懷留連東齋飲迢遞獨歸遲忽逢山媪話知枉故人期月華忩上動禽響竹間移不遇君間詠悠悠清夜思續懷友詩并序豫在吳圍城中作懷友詩二十三首其後題識者四人則嘉陵楊君孟載介丘王君止仲渤海高君季迪郯郡徐君幼文也時余與諸君及永嘉唐卿者遊皆落魄不任事故得留連詩酒間若不知有風塵之警者及兵後移家武林向所懷草三人往往而見而五君者或謫或隱各相暌異歎離合之無常感遊從之難得作續懷友詩五首余左司幽居古垣下共彼嘉樹隂比鄰豈無好念子是同心芳英帶露折清尊向月斟欲往尋遺躅荒園春草深楊典簿藩翰屈長才蹉跎事文筆賔筵罷醇醴容臺淹下秩髙門去後靜孤帆望中疾少别歲已華思君無休日王逸人衡廬古巷中髙駕日相顧芳草掩空扉知君斷幽步殘煙北寺鐘暮雨閶門樹携賞邈難期庶望遺緘素髙徵君豫既遷山郡子亦返郊園兩地花俱發離愁春共繁已罷臨池賞仍暌傾座言從來作者意寂寞向誰論徐軍咨常懷稚子悲復灑佳人泣草草從軍旅悠悠去鄉邑芳郊連騎行煙郭同舟入當時茍不樂追歡何由及題倭扇賜從天苑祕來涉雲濤逺入握體還藏向風機自展豈無白團扇能舒不能卷洗馬手中持終朝陪鳯輦過雲居精舍逶迤廣前峯到寺行屢歇亝庖竹外煙汲路松間雪觀水悟真源聞香解禪恱欲共老僧言相對還無説擬過園隱阻雨奉還在逺每傷離在近還成隔飛雨渺何窮佳期悵難得人寒市井空天晚江湖白知君掩閣臥終朝遲來客雨中偶成空齋自瀟灑況復值秋初焚香對微雨如在古僧居庭寒夕鳥下煙淡暝松疏知君寫詩處高情方似余石門道中得石字依微鳥外村逶迤煙中驛帆重因愁雨柁轉時驚石遙岑樹共青逺浪鷗同白離索詎須愁來往誰非客遷居懷沈都事歲晏共依仁孤舟泊煙麓以君吏隱地息我靜者躅家貧乞假多情狎兒童熟留滯連冬春繞庭芳草緑開尊對疏雨懸燈照深竹誰知今夜别獨掩高樓宿寄中竺泐季潭師從鍾山來遺我故人書一入白雲去相思秋雨餘徒慙塵土迹未欵竹林居遙想中峯月清梵滿空虛晚歸飲衆芳亭得髙字晨登郡峯首良遊舒鬱陶褰衣陟蘿磴停策眺蘭臯崖端俯城肆樹杪矚歸濤洞平逺帆駛天淨羣山高曠望信多美喧濁暫能逃況值芳尊酒一酌解疲勞餞方貟外力疾歸吳興省墓便還錢塘終年不出戶出戶即相違疾病欣在告田園應暫歸天寒孤舟發歲莫行人稀棹師遵舊路田翁識故衣望閭桑梓在入里人民非傷哉展丘墓遽爾辭荆扉還鄉如過客回首情依依晴春入舊臘積雪含清暉佳期遲子還勿戀故山薇蓼莪堂種莪圖可茹養兒欲代老莪生化為蒿兒大不相保憶昔兒初生長育恐不早兒羮未及嘗親骨已枯稿譬彼種莪人愛此顔色好豈不勤灌溉采擷思一飽寧知不入口埋沒同秋草詩人感兹義哀哀向穹昊堂中有孤兒千載共憂抱我願天下人有食奉翁媪為莪不為蒿庶免負遺懊答方以常雨霽見寄余方臥間館子亦辭公門豈惟名迹同中有素心存昨莫枉高駕飄颻寒雨繁觴酌未云洽煙郭遽成昏乖曠積經宿已復長憂煩晨興束方翰知子憩幽園庭隂緑始遍時夏鳥無喧感物心獨悟思與靜者論被時想清景欲往阻修轅申章酬佳貺寂寞已忘言詠懷答宋天章良辰誰不樂遊子獨慨慷慨慷亦何為感物懷故鄉故鄉亂庶已欲往川無梁安得晨風翼鴥彼西南翔出門遇行客言曾歷我疆宫室盡為墟城郭徒悲涼訪子平生親白骨委榛荒君子志四海小人懷一方勛名愧逺圖豈必梓與桑遊子不能答涕下沾衣裳葉落糞本根狐死首山岡所生良可樂貧賤乃其常嶽王墳墓中原千里志西湖四尺墳長城忍自壞神器理當分流血應為碧涅背漫成文魂魄誰相友濤江有伍君元日喜雪懷方以常片片逐年來皎色映樓臺墜花驚爆竹落素混香梅繞杯春宴裏撲馬早朝回應知洛中客高扉猶未開經德夀宫遺址廢苑民侵久故迹理當微鳯礎埋將隱鴛瓦墜應飛輦池逢折珮剃草得遺璣西陵亦如此神遊何處歸題趙彥徵作辨山卷濟濟清朝彥亭亭瓊樹枝世胄難可保零落遽如斯朱門亦已仆墨沼淡無滋空餘圖畫迹永絶人間期虗名知何益冥寞有遺悲撫卷一長歎想子平生時山居書志旅寓難自遣幸此竹林栖石苔饒古色山禽多夜啼遺形暫爾遣望道窅然迷欎欎將誰語申章默自題偶詠一首天寒院自幽客散人逾獨呼兒掩書罷步庭玩苔緑非懷髙世心為愛山中宿古詩三十二韻奉寄蘭室居士袁省掾吳興袁居士弱冠為吏師鹿鹿三十年起身遭亂離是時邊兵驕殺人如刈蓍召吏掾幕府狼狽不得辭軍門日斬斫劔戟風差差雖有幕中賔俯首莫敢窺掾曹職雖賤不畏虎豹姿論囚不當律不肯書獄辭長興本屬土咫尺為邊陲居人私往來互市各相資邊吏要功賞誘敢遭拘纍詔言犯我闕羣然送圜扉將云罪當斬掾云罪當箠師律公所守吏議我所持此本無辜人未嘗戰交綏死者不可生安得恣芟夷不然請殺掾不能相詭隨箝紙不令署抗言動旌旗將威亦少解往往免為尸從容抱案下一軍為之危事過不言功但言職當為直聲撼大府加官升左司歸來田野間婆娑鬢如絲亂世身獨全家有兩孝兒當時共事人竄死吁可悲天道當與善此語不吾欺歲久恐埋沒髙義無人知我欲為紀述傳信不傳疑請君細記憶追録休闕遺所活幾何人主名復為誰新春幸緘來此事匪我私雖微良史才要為來者規答陳傳大見寄鳥鳴何嚶嚶伐木久矣缺君子遺古風故人心未絶貽我新詩章問我間何濶置之衣袖中三日誦不輟比以瓊瑶花要以金石節豈無蕙蘭花可以慰離别君懷多芳草所思在離别惟有皎皎心思君如明月賦得麴院風荷贈别露葉漾漣漪風涼水院時翠輕愁欲斷珠圓不自持低昂隨芰蓋翩翻卷釣絲盤折驚魚遊規蕩宿禽疑為語蓮舟女聊將贈别離題琅琊亭遙睇環滁秀乃升琅琊亭吊古易為感憂懷從此興山川景如昔草木遞衰榮泠泠碧澗㵼冉冉涼飇生當户猿狖啼出谷鶯鳥吟登臨且酣笑何用勞吾形企彼賢哲士千載有餘情風雪圖為巨上人題蒼茫雲氣昏咫尺同萬里白雪飛滿空柳絮應堪比豺虎亦斂迹何為赤行子扁舟蓑笠者豈不寒墮指獨有林巾僧禪定因初起焚香坐虗室松忩時暫倚一瞬天地間如在瓊瑶裏靜菴集卷一
