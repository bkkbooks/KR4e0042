body:
  text: 靜菴集巻三明張羽撰五言律詩贈髙郵許晉兼懐王顒相見復相違尊前泣滿衣交游吾與汝出處是耶非淮柳行將轉江鴻去漸稀更憐王子敬此去幾年歸途中遇唐凱酌别前山相逢多闕後相别片時間舊話匆匆酒離程窅窅山軍坡霜外闕寺舍雪中閒情比若溪浪隨君北度關雨後登望雨洗清秋出餘雲逐望開洞庭霜葉下陽羡暮㠶来野嶂横當道寒流没釣臺登高正堪賦莫學楚臣哀寄渡别駕貫海岸投簪罷還鄉不住城官輕漢别駕待重魯諸生研沼尋常滿書堂早晚成惟嫌賣藥處兒女尚知名寄車孝廉昭亭隠餘不舊人推武子賢古書堆臥内流水到階前畏酒心先醉吟詩思獨𤣥更聞懐逸興相約訪丹泉園全懐全許二校書市朝非我戀此地養疎慵園古苔連竹忩明雪在松素帷生道意清鏡長衰容不見羊求過空尋舊屐蹤與學子沈集畫并題筆硯隨人老雲山發闕新昔心期後世餘習自前身石埭殘沙曉茅簷古木春卜居能有此甘與白鷗鄰題闕翥畫便面垂釣亂蒲間心將鷗鳥閒長竿不設餌孤艇坐㸔山清曉乗流出薄暮放歌還寄言同羣者所得匪闕客中奉懐竹溪游好四首共識王孫貴吾知長者賢逢人多話舊愛我竟忘年對飲頻辭酒相思却放舡别来成寂寞得句向誰傳右西齋先生質朴古風存家連水竹村舊䝉公子愛兼得里人尊客至頻傾釀閒時自灌園西樓有枕席高臥任乾坤右松筠鄉老四海盡王臣多君歴苦辛繩橋獨往路雪嶺幾時春哭子餘枯眼休官一病身還聞有趣召未許便垂綸右彦良别駕君方還邑里我復離家園交臂仍相識傷心孰與論過橋聞訪寺帶雨共歸村别後交游冷唯應獨閉門右鈞徳貳令寄周伯陽薄宦志多違言歸未得歸一隨江燕去五見塞鴻飛素髮應添鏡緇塵已滿衣裁詩擬相寄人到秣陵稀題周山人所居門掩千山裏春風亂碧苔幽人愛此徑樵子少曾来竹筍清心饌松花養性盃為君淹俗駕累日共徘徊寄金子敬束髮事邊庭琱弓白羽翎老知農有味病惡藥無靈為客闕三徑教兒誦五經定應琴酒罷餘興到丹青寄友人舊宅閒坊裏身形似鶴長詩才兼樂府儒服間戎裝愛馬開新廐留賔掃靜房懐君西望逺一鴈下斜陽寄錢唐吳山人占得閒坊住園扉近竹幽經方教子讀藥草課童收湖色揺春幌濤深入夜樓應騎蹇驢去城市漫浮游寄渭清逺蒲室傳衣後清名重一時外甥多似舅弟子已如師微宻千花偈清淳五字詩板橋西畔路風雪阻幽期題徐士元畫梅雪軒圖髙軒歲莫情取物製為名人與梅俱素詩因雪倍清散鹽能潤物結實擬和羮稍待花開夜来聽撲樹聲圍城中懐友風骨多儒相為師不憚貧買書高着價避酒屢辭巡經學傳門弟緦衣塟里人懐君桑梓舊寧比異鄉親右李訥破屋臨湖住閒身似鶴長逢人矜侠氣遇難耻儒裝有婦頻修藥無兒解奉觴從来多逺志今日在何鄉右莘野感秋烟火四隣闕蛩聲孤舘幽人閒知永夜月白見髙秋風露驚華髮關河憶壯游吾年已如此素志祗堪羞懐故妻及亡兒時在姑蘇圍城中故妻及稚子墓俱在吳興每歲常一展省風塵阻絶泫然興懐因賦短詩用寄哀悰何處塟深情牽車出曉城冡間無白日鏡裏是前生積壤銷釵鳯荒苔掩珮瓊空餘故衣在手迹尚分明埋骨近蓮宫松杉滿逕風明珠辭掌上白璧毁泉中巻有塗鴉墨花迷趁蝶樷傷心嬴博者此恨詎能同憇桃花園古巷號桃花茅簷背竹斜賣蔬供北郭放水與西家土脉通潮信湖光助物華我来思借地學種五文𤓰寄靈隠良上人空界近諸天髙居息衆縁山如西竺嶺人悟上乗舡定力能消病浮生不論年聽猿曽有約幽夢遶雲邊遊三茅觀洞府閟旾雲名從地脉分金毫開妙相玉札瑑靈文鶴馭三天下鸞笙五夜聞何因避世網香火事茅君炬上人之金陵未還保叔塔院留贈聞説離山久生縁遍外方三衣長挂體一鉢不持糧禪處松將偃歸時草正芳殘書看未了擬借㝡高房題秋月樓樓近素娥宫涼宵晝日同象筵㸔似水碧瓦映疑空曲宴怜規滿冲情苦闕中不見陳王苑委照緑苔中来青樓畫粉叠樓腰青山不費招忩開明月夜簾捲白雲朝淡借澄江映濃因落景饒何勞雙屐去千里訪岧嶤寄沙門文藻藻公多弟子住遍兩峯間行道無拘着孤雲自往還緇衣衝莫雨金䇿響空山愧我遊方内春風獨掩關圍中懐方員外作吏風塵際常懐隠遁情偷閑頻謁告厭俗擬歸畊月幌㽞賔臥花宫請客行舊書空滿箧一覽一霑纓登吳山西畨大成寺閣境寂不生塵僧多是北人樂隨天女仗花遶棾王輪闕室爐熏聚清泉茗味新無生端可慕只恐愧吾身陪方徵君月遊園景㺯春韶曾来醉緑瓢誰知明月夜尤勝艶陽朝竹碧茶烟度池清蕙氣飄預愁城鼓動獨上木蘭橈憩海㑹寺南亭亭子碧江潯雲霞生逺心千山正揺落四客復登臨地勢分吳越濤聲送古今悠然白鳥意欲去更長吟九日過東園家居白日長學圃亦何妨延客開芳徑留僧置淨床夜燈山頂寺寒竈竹間房休沐惟来此塵情得暫忘雲日㺯秋暉𤣥齋坐掩扉草芳寒蝶戀竹靜午禽啼雅㑹便詩侣閑行稱道衣若教隣近住爭遣往来稀樓中雪意樓角聚寒鴉江氛掩夕霞亂雲方似葉凍雨未成花天意憐貧士人情向酒家愧無梁苑賦空擬詠瑶華方遶人話别兹别可無愁還鄉豈浪遊田園重作主家口半登舟雪意孤村逺雞聲别墅幽送君翻自咲歸計轉悠悠正月二日雪瞥屑復飄蕭隨春態更嬌未甘從舊臘還解避正朝琪樹花偏早朱樓玉易銷若教先一日應濕紫宸朝奉闕園隠期予不至雨舘臥多時園亭誤宿期恨無飛去夢忽見寄来思聚首難如此論心復有誰妍詞何以報藏玩比青絲寄方員外蕭散任天真渾忘是病身問安多省吏投宿半鄉人塵鎻藏書閣風翻濾藥巾未應長閉户憔悴過今春陪明天目會方員外東園柴門連水竹車馬少曽通人臥春寒裡僧来莫雨中醉看新柳色吟對落花風何用談名迹餘生已悟空臯亭有感憶昨初經亂家從此路携漁汀憐共泊僧舍記曾題同載人俱沒重来思轉迷客愁政無奈况值雨淒淒送方東園雲山已改夏花鳥尚留春却送還鄉客空慚久滯人扁舟生旅思孤舘閉愁身唯應掩窓臥倘有夢相親閏七月七夕巧侣重招邀朱樓映晚霄鳯機仍歇杼鵲翼再成橋雲幄香猶在霞衣涙未消帝應憐别怨暫許閏年饒過西湖拂曙度嚴城蘭舟或且迎青山霧裏出粉堞水中明粧斷倡樓色歌絶妓航聲繁華任自歇心賞有餘清寓戴山僧舍松杉古佛廬借地即安居鳥影流閑幔竹光揺素書山寒人語寂雨冷桂華疎一悟三空意榮名信是虛七言律詩吳興南門懐古郭門南面似襄州野樹寒山對倚樓公子城空無食客霸王宅壊有荒丘夕陽冉冉仍西下秋水茫茫共北流只是今時已惆悵不應更為昔人愁送谷克讓湖南侍親并柬李中卿縣丞五兩風生楚客歸夢魂先已到庭闈九疑舜塜蒼梧野三國周郎赤壁磯天地悠悠人自老江山欎欎鳥空飛若逢李白煩相問别後平安一字稀僧齋寒夜二首上方臺殿駐餘暉露下烟寒獨掩扉山木蕭條啼鳥歇道門清凈俗人稀鐘兼逺籟回郷夢鴈帶新凉到客衣擬結許詢同下榻自憐幽興每相違山舘蕭條寢復興經聲遥出最髙層客愁無伴依童子禪學多難憶古僧階下鳴蛩沿定闕竹間栖鴿避懸燈逺游亦有幽棲志擬絶塵縁老未能行藥過西崦白日都銷筆硯間偶因行藥到松關秋聲不盡蕭蕭樹夕景無多淡淡山蟲響寒亝僧自定苔荒深院客長門已知身世俱成幻莫歎西風鬢易斑登德清百僚山湖鄉風景三秋後佛界軒亭四望開碧水翻從城裡過青山直到縣門来魚商酒市晴偏集釣艇蓮舟晚共回自古登高能作賦坐中誰是大賢才寄述古道上人選佛塲中讓長年愛投靜刹寄髙禪法身謾應人天供世諦兼通内外篇月照袈裟行道遍華飛如意説經圓聞師剰有藏書在擬借隣房未有縁九日登道塲山同吳逸人賦忽驚九日當今日同在他鄉望故鄉百里山河天盡處萬家城郭水中央帷間風動聞靈語寺裡林疎見佛香不是避喧来此地無妨覽勝到斜陽揚州道中馬頭津口足風波歲晏遥乗一傳過南渡客来多漢語下江舡去半吳歌蕪城縂入新編户𤓰步斜連古漕河何處吹簫明月夜野田茅屋曉烟多晚過淮隂軍城鐡鎻曉開關使節星馳未敢閒淮水東流應落海𤓰州北去少逢山行人欲斷寒烟外逺燒時明亂葦間却憶帝城風物盛禮成須復上春還鳯陽使還口號拜陵初罷雪雲晴使者南還荷聖靈馬上頓更新舊律風前重數短長亭逢人問俗猜傖語到處尋源騐水經却憶長千橋畔柳歸時應待眼青青正月晦日雪不肯凝祥向臘前却来呈瑞入新年開粧已落梅花後學舞爭居柳絮先乍積欲迷芳草地易消應避艶陽天遥知大輅躬耕處共賀瑶華滿舜田雪中懐周大使倬憶君官舍傍苔磯正是天寒雪擁扉堂上客来公吏散山前市罷估舡稀宦情淡薄同流水鄉思蒼茫對夕暉歲晚荒村無可寄擬將詩句託鴻飛雨中言懐邑里蕭條民未復齋居卑濕病相牽客愁連月唯聞雨農事關心擬問天自幸拙畊終歲飽更慚中酒日高眠不才如此真堪棄敢負明峕費俸錢送僧還天台省親戴君東去路迢迢應為寧親到石橋江上中亝尋午墅沙邊夜火雜寒潮宰官問法留三宿慈母焚香製七條歲晚定知歸本寺待予聽雪坐中宵菁山石梯閣與方二彛徐七賁周二復夜坐陪賦忽逢晦日驚春盡為倚高忩到夜分東崦平連西崦樹上方遥見下方雲澗聲人語空中辨花氣林香暗裏聞莫道暫時留愛賞移家終擬避塵氛贈釋子良圮辭家譯徧五天書避亂聊尋廢刹尼片月池中觀色相千花塔下禮清虚行隨流水因亝後坐得新詩是偈餘㸔說到城還不住余生汨汨竟何如寄南屏渭長老蒲室傳心第一宗老尋古刹寄行踪散花偈就人争冩壊色衣穿自懶縫案上金經皆貝葉手中玉麈是青松何年惠逺重開社来聽東林寺裏鐘春日登戴山懐舊選勝尋常此地行春日望湘湘更明白浪逼連陽羡樹青山半掩闔閭城樓臺高下千家柳阡陌東西幾處鶯忽憶從前舊游處無端愁思一峕生寄贈紫金精舍喜性二釋子精藍石畔接城闉野水交游絶四隣過去真僧留半偈浮来古佛見三身夜深門有聽經虎歲稔厨多施米人遥憶兩禪相對處儼然無着與天親艤舟孺山懐徐孺子登髙懐古重徘徊試薦山泉當酒盃此地不聞懸榻待當峕應為吊䘮来闕栖壊闕殘僧散風動寒燈古殿開千載南州寥落甚獨尋遺迹遶蒼苔奉同西齋先生前丘㸔梅最愛前村雙樹梅千跗萬蕚映春開空怜地主能栽得卻少閑人為看来弱蕊愁風輕着水瘦枝嫌雪淺封苔不因重度溪橋險杖策應過日幾迴題唐叔良闕齋髙齋每到思無窮門巷玲瓏野望通片雨隔村猶夕照疎林帶水已秋風藥囊詩巻開行後香灺燈光靜坐中為問祗今滄海上如君無事幾人同立春吳黃二友皆有作率爾同賦隣舍蕭疎水竹連共看原野變風烟青春又數從今日白髮應多似去年世上浮名都莫愛客中佳節且相怜尋思歲計渾無物只益新詩數百篇元日試筆冩似吳黃二友草緑南原裛曉塵氷開池色動龍鱗天邊北斗迴今日江上東風似故人莫憶往時悲往事且將新句荅新春餘生願見昇平日長對青樽夀老親遊方山觀梅尋芳正及上春時澗道縈紆恨到遲花似西湖先得暖人如東閣搃能詩酒中瘦影依依見席上寒香淡淡垂日莫醉歸簮滿帽從教人咲鬢如絲奉寄梅雪聞說公亭傍水開黃茅為瓦不須栽商舡無數青山逸書案尋常白鳥来已信漆園非俗吏誰知關令是仙才煩君莫抱窮途恨萬事都將付酒盃次髙靜學先生韵緼袍無裡食無餘每被旁人咲著書郭泰徒勞夸叔度楊雄何敢擬相如玉堂天上非吾夢紫極宫前有敝廬安得故人隣壤住溪頭来往賦閒居題陳氏先隴圖雲山漠漠冡嵬嵬馬鬛封前躑躅開宗子秪縁懐牒去路人時為看碑来松間芻狗埋秋草地底魚燈徹夜臺惆悵年年寒食近白楊風起為興哀送胡宗禹之播州驛丞便路之官暫到家九溪窮處是天涯夜郎沙暖多龍跡槃瓠山迴似犬牙浦口勞歌催畫鷁門前使節詠皇華途中定有江行藁好寄東風萬里槎贈景山僧中道立古寺殘燈亂後稀獨来林下掩柴扉化人每轉千聲偈辟地唯將一衲衣池上蓮芳辭伴去山中松偃識師歸非關願薄難行道自是羣生與道違寄方貟外結髮從戎二十年獨揮赤管萬人前新辭禄秩縁思隠閒闕齋居似闕禪病裏每書賖藥劵愁中久絶㸔花筵懐君不隔天涯逺只在荒城闕雨邊寄王止仲髙季廸祗恨孤城未解圍圍開翻遣别相知夕陽江上怱怱酒細雨燈前草草詩有夢直從花落後無書空過鴈来時郭西古寺題名處今日重遊却共誰題故秀才陳哲手抄杜詩世間無藥補清羸身死䨇親却倚誰少婦冩藏臨沒語故人收得舊編詩空忩夜漏沾書檢壊壁秋塵落硯池須信才名天所忌後生休更擅文詞送張憲史之江西燕子歸時却離家洪州迢逓在天涯風㠶落浦朝投驛江火明隄夜渉沙客裏寄書逢馹便幙中提筆待霜衙来春我亦尋歸棹約爾南湖看杏花復公録文見寄空堂燕坐一燈懸僧臘多應倍俗年老去已除行脚債悟来不說定心禪千花禮遍諸天降半偈都將萬法傳每愧塵勞煩見問同鄉兼恐更同縁重陽道院玉洞泉香草自春丹樓南下瞰城闉青衣童子曾来地白石先生過去身九轉爐寒銷宿火七真堂古鎻秋塵松間道士多凡骨未省誰為出世人燈花次韵畫堂銀燭照歌鐘醉眼俄驚火樹紅白玉屏深留晚艶絳紗籠暖䕶春樷闌干清淚非因雨狼藉殘煤搃為風更憶禁垣歸路靜金蓮隨馬散文虹寳叔塔院赤闌閒倚化人宫湖上春隂望不窮百尺樓臺空相外萬家城郭雨聲中齋房漏滴蓮花水講殿經翻貝葉風自咲世縁心似石擬焚香炷問生公贈蘭室居士袁省掾棄官歸去學尋真有道何愁白髮新湖上尋春靈夀杖松間對客華陽巾佛書謾冩縁脩靜丹藥頻丸為施人自愧後生無所事也辭冠蓋乞閒身寄伏虎道塲聫上人聖明親選黒衣人似共名山有宿因地上布金多長者室中傳偈搃門人法身已應諸天相定力能消萬劫塵愧我才名非鑿齒道安何事獨相親送劉孝亷入蜀長亭把酒唱離歌别路迢迢奈爾何淮水東来吳地盡函關西去蜀山多秦宫萬井生禾黍漢闕千門長薜蘿勸子慎須崇令徳莫將功業更蹉跎宿慶上人房朱甍寳地絶塵埃松下閒過步縁苔仙梵更從蓮室度佛香時到竹房来己知靜者通禪觀重聽髙僧話劫灰寒榻不須燈照臥夜深明月滿池臺咏美人手嫩於春笋白於霜輕拂菱花試曉粧彈瑟每嫌銀甲小吹笙還愛玉􅊏長冝將彩筆題紅葉倦把金針倚繡床拾翠歸来芳徑裡逢人莫問錦香囊五言排律送秦縣丞北人南住久五十始成名理訟通蠻語居官少宦情開尊山遶廨泛棹水浮城一飯恩猶報三年政獨平計工歸上考增秩被深榮早晚椷書到唯聽新鴈聲送鄭主簿閶闔曉雲黃龍盤紫禁長小臣朝上國天子坐明堂名入郎官奏班隨奉禮將考功唐典故治行漢循良秋雨莱蕪甑春風召伯棠因君清似水挹彼當離觴十月一日從幸太平門閱武應制四海清無戰三農樂有秋元戎陳虎旅天子詔貙劉肅殺遵時令登臨展豫游江山明組練海國壯貔貅旄鉞傳天語韜鈐禀廟謀射蛟應小漢搏獸已卑周佳氣投丹轂祥風轉采斿武功今已偹文德願兼脩虛沗金鑾客元才詠大蒐元日曉祀皇明嚴祀典大孝極尊親太室躬臨祼先陵復遣臣九重頒命曉一節渡江春豐沛真王地枌榆舊社民駿奔祗事早齋宿省躬頻殿闕風雲盛楸梧雨露新陳兵森虎豹清道表麒麟列岫天垂障長淮地湧紳潛光騰白璧盛徳琢蒼珉閉匠嗟秦侈除瘐識漢仁𤣥堂存秘器玉座仰清塵億載靈如在元正禮再申加籩時物偹奉爼大牲陳祝嘏傳多祚餘膰及衆賔獻酬神惠浹醉飽聖恩均風雪催歸盖江湖戀帝宸大郊期不逺言邁敢逡巡元夕錢塘懐古聞説蕭朝事今宵晝日同都人丹闕下天子綵樓中燈熖千枝月衣香百和風墜鈿隨歩拾遊騎徹明通節物長年在豪華逝水空無因見遺老重問古行宫春雨軒霡霂洒空濛憑軒望不窮温迷回鴈渚暖帶落花風着柳應催緑闕桃更上紅氣縈蛛網闕潤合燕泥融送響苔堦上飄寒緑瑣中此時須下榻琴酌暫相同杏隠絳蕚競春華丹光照佀霞虎眠應守榖鶯過每啣花望處疑仙島移来是病家冩方㸔子墜曝藥避隂遮山客留仁種貧人寄劵賖茂陵那解此徒説棗如𤓰竹雨軒竹裏蕭蕭雨軒中景自幽明珠當砌落碧玉倚闌愁烟護常疑晚風隨鎮似秋響分絃上度色借畫中浮翠葉濡偏重瓊林着更柔羽霑飡實鳯衣濕在林鳩嶰谷隂時覔淇園暝處求青苔知漸厚緑霧覺添稠截管情何及題竿興未酬阮生宜徑造着屐與誰遊靜菴集巻三
