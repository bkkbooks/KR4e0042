body:
  text: 靜菴集卷三明張羽撰五言律詩贈髙郵許晉兼懷王顒相見復相違尊前泣滿衣交遊吾與汝出處是耶非淮柳行將轉江鴻去漸稀更憐王子敬此去幾年歸途中遇唐凱酌别前山相逢多闕後相别片時間舊話匆匆酒離程窅窅山軍坡霜外闕寺舍雪中間情比若溪浪隨君北度關雨後登望雨洗清秋出餘雲逐望開洞庭霜葉下陽羡暮帆來野嶂橫當道寒流沒釣臺登高正堪賦莫學楚臣哀寄渡别駕貫海岸投簪罷還鄉不住城官輕漢别駕待重魯諸生研沼尋常滿書堂早晚成惟嫌賣藥處兒女尚知名寄車孝廉昭亭隱餘不舊人推武子賢古書堆臥內流水到階前畏酒心先醉吟詩思獨玄更聞懷逸興相約訪丹泉園全懷全許二校書市朝非我戀此地養疏慵園古苔連竹忩明雪在松素帷生道意清鏡長衰容不見羊求過空尋舊屐蹤與學子沈集畫并題筆硯隨人老雲山發闕新昔心期後世餘習自前身石埭殘沙曉茅簷古木春卜居能有此甘與白鷗鄰題闕翥畫便面垂釣亂蒲間心將鷗鳥間長竿不設餌孤艇坐看山清曉乘流出薄暮放歌還寄言同羣者所得匪闕客中奉懷竹溪遊好四首共識王孫貴吾知長者賢逢人多話舊愛我竟忘年對飲頻辭酒相思却放船别來成寂寞得句向誰傳右西齋先生質朴古風存家連水竹村舊蒙公子愛兼得里人尊客至頻傾釀間時自灌園西樓有枕席高臥任乾坤右松筠鄉老四海盡王臣多君歷苦辛繩橋獨往路雪嶺幾時春哭子餘枯眼休官一病身還聞有趣召未許便垂綸右彥良别駕君方還邑里我復離家園交臂仍相識傷心孰與論過橋聞訪寺帶雨共歸村别後交遊冷唯應獨閉門右鈞德二令寄周伯陽薄宦志多違言歸未得歸一隨江燕去五見塞鴻飛素髮應添鏡緇塵已滿衣裁詩擬相寄人到秣陵稀題周山人所居門掩千山裏春風亂碧苔幽人愛此徑樵子少曾來竹筍清心饌松花養性杯為君淹俗駕纍日共徘徊寄金子敬束髮事邊庭雕弓白羽翎老知農有味病惡藥無靈為客闕三徑教兒誦五經定應琴酒罷餘興到丹青寄友人舊宅間坊裏身形似鶴長詩才兼樂府儒服間戎裝愛馬開新廄留賔掃靜房懷君西望逺一鴈下斜陽寄錢唐吳山人占得間坊住園扉近竹幽經方教子讀藥草課童收湖色搖春幌濤深入夜樓應騎蹇驢去城市漫浮遊寄渭清逺蒲室傳衣後清名重一時外甥多似舅弟子已如師微密千花偈清淳五字詩板橋西畔路風雪阻幽期題徐士元畫梅雪軒圖髙軒歲莫情取物製為名人與梅俱素詩因雪倍清散鹽能潤物結實擬和羮稍待花開夜來聽撲樹聲圍城中懷友風骨多儒相為師不憚貧買書高著價避酒屢辭巡經學傳門弟緦衣葬里人懷君桑梓舊寧比異鄉親右李訥破屋臨湖住間身似鶴長逢人矜俠氣遇難耻儒裝有婦頻修藥無兒解奉觴從來多逺志今日在何鄉右莘野感秋煙火四鄰闕蛩聲孤館幽人間知永夜月白見髙秋風露驚華髮關河憶壯遊吾年已如此素志祗堪羞懷故妻及亡兒時在姑蘇圍城中故妻及稚子墓俱在吳興每歲常一展省風塵阻絶泫然興懷因賦短詩用寄哀悰何處葬深情牽車出曉城冡間無白日鏡裏是前生積壤銷叉鳯荒苔掩珮瓊空餘故衣在手迹尚分明埋骨近蓮宫松杉滿徑風明珠辭掌上白璧毁泉中卷有塗鴉墨花迷趁蝶叢傷心嬴博者此恨詎能同憩桃花園古巷號桃花茅簷背竹斜賣蔬供北郭放水與西家土脈通潮信湖光助物華我來思借地學種五文瓜寄靈隱良上人空界近諸天髙居息衆緣山如西竺嶺人悟上乘船定力能消病浮生不論年聽猿曽有約幽夢繞雲邊遊三茅觀洞府閟春雲名從地脈分金毫開妙相玉札瑑靈文鶴馭三天下鸞笙五夜聞何因避世網香火事茅君炬上人之金陵未還保叔塔院留贈聞説離山久生緣遍外方三衣長挂體一鉢不持糧禪處松將偃歸時草正芳殘書看未了擬借最高房題秋月樓樓近素娥宫涼宵晝日同象筵看似水碧瓦映疑空曲宴憐規滿沖情苦闕中不見陳王苑委照緑苔中來青樓畫粉疊樓腰青山不費招忩開明月夜簾捲白雲朝淡借澄江映濃因落景饒何勞雙屐去千里訪岧嶤寄沙門文藻藻公多弟子住遍兩峯間行道無拘著孤雲自往還緇衣衝莫雨金䇿響空山愧我遊方內春風獨掩關圍中懷方員外作吏風塵際常懷隱遁情偷間頻謁告厭俗擬歸耕月幌留賔臥花宫請客行舊書空滿篋一覽一霑纓登吳山西畨大成寺閣境寂不生塵僧多是北人樂隨天女仗花繞棾王輪闕室爐熏聚清泉茗味新無生端可慕只恐愧吾身陪方徵君月遊園景㺯春韶曾來醉緑瓢誰知明月夜尤勝艷陽朝竹碧茶煙度池清蕙氣飄預愁城鼓動獨上木蘭橈憩海會寺南亭亭子碧江潯雲霞生逺心千山正搖落四客復登臨地勢分吳越濤聲送古今悠然白鳥意欲去更長吟九日過東園家居白日長學圃亦何妨延客開芳徑留僧置淨床夜燈山頂寺寒竈竹間房休沐惟來此塵情得暫忘雲日㺯秋暉玄齋坐掩扉草芳寒蝶戀竹靜午禽啼雅會便詩侣間行稱道衣若教鄰近住爭遣往來稀樓中雪意樓角聚寒鴉江氛掩夕霞亂雲方似葉凍雨未成花天意憐貧士人情向酒家愧無梁苑賦空擬詠瑶華方繞人話别兹别可無愁還鄉豈浪遊田園重作主家口半登舟雪意孤村逺雞聲别墅幽送君翻自笑歸計轉悠悠正月二日雪瞥屑復飄蕭隨春態更嬌未甘從舊臘還解避正朝琪樹花偏早朱樓玉易銷若教先一日應濕紫宸朝奉闕園隱期豫不至雨館臥多時園亭誤宿期恨無飛去夢忽見寄來思聚首難如此論心復有誰妍詞何以報藏玩比青絲寄方員外蕭散任天真渾忘是病身問安多省吏投宿半鄉人塵鎖藏書閣風翻濾藥巾未應長閉户憔悴過今春陪明天目會方員外東園柴門連水竹車馬少曽通人臥春寒裡僧來莫雨中醉看新柳色吟對落花風何用談名迹餘生已悟空臯亭有感憶昨初經亂家從此路携漁汀憐共泊僧舍記曾題同載人俱沒重來思轉迷客愁政無奈况值雨淒淒送方東園雲山已改夏花鳥尚留春却送還鄉客空慚久滯人扁舟生旅思孤館閉愁身唯應掩窗臥倘有夢相親閏七月七夕巧侣重招邀朱樓映晚霄鳯機仍歇杼鵲翼再成橋雲幄香猶在霞衣淚未消帝應憐别怨暫許閏年饒過西湖拂曙度嚴城蘭舟或且迎青山霧裏出粉堞水中明粧斷倡樓色歌絶妓航聲繁華任自歇心賞有餘清寓戴山僧舍松杉古佛廬借地即安居鳥影流間幔竹光搖素書山寒人語寂雨冷桂華疏一悟三空意榮名信是虛七言律詩吳興南門懷古郭門南面似襄州野樹寒山對倚樓公子城空無食客霸王宅壞有荒丘夕陽冉冉仍西下秋水茫茫共北流只是今時已惆悵不應更為昔人愁送谷克讓湖南侍親并柬李中卿縣丞五兩風生楚客歸夢魂先已到庭闈九疑舜塜蒼梧野三國周郎赤壁磯天地悠悠人自老江山欎欎鳥空飛若逢李白煩相問别後平安一字稀僧齋寒夜二首上方臺殿駐餘暉露下煙寒獨掩扉山木蕭條啼鳥歇道門清淨俗人稀鐘兼逺籟回鄉夢鴈帶新涼到客衣擬結許詢同下榻自憐幽興每相違山館蕭條寢復興經聲遙出最髙層客愁無伴依童子禪學多難憶古僧階下鳴蛩沿定闕竹間栖鴿避懸燈逺遊亦有幽棲志擬絶塵緣老未能行藥過西崦白日都銷筆硯間偶因行藥到松關秋聲不盡蕭蕭樹夕景無多淡淡山蟲響寒亝僧自定苔荒深院客長門已知身世俱成幻莫歎西風鬢易斑登德清百僚山湖鄉風景三秋後佛界軒亭四望開碧水翻從城裡過青山直到縣門來魚商酒市晴偏集釣艇蓮舟晚共回自古登高能作賦坐中誰是大賢才寄述古道上人選佛場中讓長年愛投靜剎寄髙禪法身謾應人天供世諦兼通內外篇月照袈裟行道遍華飛如意説經圓聞師剩有藏書在擬借鄰房未有緣九日登道場山同吳逸人賦忽驚九日當今日同在他鄉望故鄉百里山河天盡處萬家城郭水中央帷間風動聞靈語寺裡林疏見佛香不是避喧來此地無妨覽勝到斜陽揚州道中馬頭津口足風波歲晏遙乘一傳過南渡客來多漢語下江船去半吳歌蕪城總入新編户瓜步斜連古漕河何處吹簫明月夜野田茅屋曉煙多晚過淮隂軍城鐡鎖曉開關使節星馳未敢間淮水東流應落海瓜州北去少逢山行人欲斷寒煙外逺燒時明亂葦間却憶帝城風物盛禮成須復上春還鳯陽使還口號拜陵初罷雪雲晴使者南還荷聖靈馬上頓更新舊律風前重數短長亭逢人問俗猜傖語到處尋源驗水經却憶長千橋畔柳歸時應待眼青青正月晦日雪不肯凝祥向臘前却來呈瑞入新年開粧已落梅花後學舞爭居柳絮先乍積欲迷芳草地易消應避艷陽天遙知大輅躬耕處共賀瑶華滿舜田雪中懷周大使倬憶君官舍傍苔磯正是天寒雪擁扉堂上客來公吏散山前市罷估船稀宦情淡薄同流水鄉思蒼茫對夕暉歲晚荒村無可寄擬將詩句託鴻飛雨中言懷邑里蕭條民未復齋居卑濕病相牽客愁連月唯聞雨農事關心擬問天自幸拙耕終歲飽更慚中酒日高眠不才如此真堪棄敢負明峕費俸錢送僧還天台省親戴君東去路迢迢應為寧親到石橋江上中亝尋午墅沙邊夜火雜寒潮宰官問法留三宿慈母焚香製七條歲晚定知歸本寺待豫聽雪坐中宵菁山石梯閣與方二彛徐七賁周二復夜坐陪賦忽逢晦日驚春盡為倚高忩到夜分東崦平連西崦樹上方遙見下方雲澗聲人語空中辨花氣林香暗裏聞莫道暫時留愛賞移家終擬避塵氛贈釋子良圮辭家譯遍五天書避亂聊尋廢剎尼片月池中觀色相千花塔下禮清虛行隨流水因亝後坐得新詩是偈餘看説到城還不住余生汨汨竟何如寄南屏渭長老蒲室傳心第一宗老尋古剎寄行蹤散花偈就人爭寫壞色衣穿自懶縫案上金經皆貝葉手中玉麈是青松何年惠逺重開社來聽東林寺裏鐘春日登戴山懷舊選勝尋常此地行春日望湘湘更明白浪逼連陽羡樹青山半掩闔閭城樓臺高下千家柳阡陌東西幾處鶯忽憶從前舊遊處無端愁思一峕生寄贈紫金精舍喜性二釋子精藍石畔接城闉野水交遊絶四鄰過去真僧留半偈浮來古佛見三身夜深門有聽經虎歲稔厨多施米人遙憶兩禪相對處儼然無著與天親艤舟孺山懷徐孺子登髙懷古重徘徊試薦山泉當酒杯此地不聞懸榻待當峕應為吊喪來闕栖壞闕殘僧散風動寒燈古殿開千載南州寥落甚獨尋遺迹繞蒼苔奉同西齋先生前丘看梅最愛前村雙樹梅千跗萬蕚映春開空憐地主能栽得卻少間人為看來弱蕊愁風輕著水瘦枝嫌雪淺封苔不因重度溪橋險杖策應過日幾回題唐叔良闕齋髙齋每到思無窮門巷玲瓏野望通片雨隔村猶夕照疏林帶水已秋風藥囊詩卷開行後香灺燈光靜坐中為問祗今滄海上如君無事幾人同立春吳黃二友皆有作率爾同賦鄰舍蕭疏水竹連共看原野變風煙青春又數從今日白髮應多似去年世上浮名都莫愛客中佳節且相憐尋思歲計渾無物只益新詩數百篇元日試筆寫似吳黃二友草緑南原裛曉塵氷開池色動龍鱗天邊北斗回今日江上東風似故人莫憶往時悲往事且將新句答新春餘生願見升平日長對青樽夀老親遊方山觀梅尋芳正及上春時澗道縈紆恨到遲花似西湖先得暖人如東閣總能詩酒中瘦影依依見席上寒香淡淡垂日莫醉歸簮滿帽從教人笑鬢如絲奉寄梅雪聞説公亭傍水開黃茅為瓦不須栽商船無數青山逸書案尋常白鳥來已信漆園非俗吏誰知關令是仙才煩君莫抱窮途恨萬事都將付酒杯次髙靜學先生韻緼袍無裡食無餘每被旁人笑著書郭泰徒勞夸叔度楊雄何敢擬相如玉堂天上非吾夢紫極宫前有敝廬安得故人鄰壤住溪頭來往賦間居題陳氏先隴圖雲山漠漠冡嵬嵬馬鬛封前躑躅開宗子秪緣懷牒去路人時為看碑來松間芻狗埋秋草地底魚燈徹夜臺惆悵年年寒食近白楊風起為興哀送胡宗禹之播州驛丞便路之官暫到家九溪窮處是天涯夜郎沙暖多龍迹槃瓠山回似犬牙浦口勞歌催畫鷁門前使節詠皇華途中定有江行藁好寄東風萬里槎贈景山僧中道立古寺殘燈亂後稀獨來林下掩柴扉化人每轉千聲偈辟地唯將一衲衣池上蓮芳辭伴去山中松偃識師歸非關願薄難行道自是羣生與道違寄方貟外結髮從戎二十年獨揮赤管萬人前新辭祿秩緣思隱間闕齋居似闕禪病裏每書賖藥劵愁中久絶看花筵懷君不隔天涯逺只在荒城闕雨邊寄王止仲髙季迪祗恨孤城未解圍圍開翻遣别相知夕陽江上匆匆酒細雨燈前草草詩有夢直從花落後無書空過鴈來時郭西古寺題名處今日重遊却共誰題故秀才陳哲手抄杜詩世間無藥補清羸身死雙親却倚誰少婦寫藏臨沒語故人收得舊編詩空忩夜漏沾書檢壞壁秋塵落硯池須信才名天所忌後生休更擅文詞送張憲史之江西燕子歸時却離家洪州迢遞在天涯風帆落浦朝投驛江火明隄夜涉沙客裏寄書逢馹便幕中提筆待霜衙來春我亦尋歸棹約爾南湖看杏花復公録文見寄空堂燕坐一燈懸僧臘多應倍俗年老去已除行腳債悟來不説定心禪千花禮遍諸天降半偈都將萬法傳每愧塵勞煩見問同鄉兼恐更同緣重陽道院玉洞泉香草自春丹樓南下瞰城闉青衣童子曾來地白石先生過去身九轉爐寒銷宿火七真堂古鎖秋塵松間道士多凡骨未省誰為出世人燈花次韻畫堂銀燭照歌鐘醉眼俄驚火樹紅白玉屏深留晚艷絳紗籠暖護春叢闌干清淚非因雨狼藉殘煤總為風更憶禁垣歸路靜金蓮隨馬散文虹寶叔塔院赤闌間倚化人宫湖上春隂望不窮百尺樓臺空相外萬家城郭雨聲中齋房漏滴蓮花水講殿經翻貝葉風自笑世緣心似石擬焚香炷問生公贈蘭室居士袁省掾棄官歸去學尋真有道何愁白髮新湖上尋春靈夀杖松間對客華陽巾佛書謾寫緣修靜丹藥頻丸為施人自愧後生無所事也辭冠蓋乞間身寄伏虎道場聫上人聖明親選黑衣人似共名山有宿因地上布金多長者室中傳偈總門人法身已應諸天相定力能消萬劫塵愧我才名非鑿齒道安何事獨相親送劉孝亷入蜀長亭把酒唱離歌别路迢迢奈爾何淮水東來吳地盡函關西去蜀山多秦宫萬井生禾黍漢闕千門長薜蘿勸子慎須崇令德莫將功業更蹉跎宿慶上人房朱甍寶地絶塵埃松下間過步緣苔仙梵更從蓮室度佛香時到竹房來己知靜者通禪觀重聽髙僧話劫灰寒榻不須燈照臥夜深明月滿池臺咏美人手嫩於春笋白於霜輕拂菱花試曉粧彈瑟每嫌銀甲小吹笙還愛玉􅊏長冝將彩筆題紅葉倦把金針倚繡床拾翠歸來芳徑裡逢人莫問錦香囊五言排律送秦縣丞北人南住久五十始成名理訟通蠻語居官少宦情開尊山繞廨泛棹水浮城一飯恩猶報三年政獨平計工歸上考增秩被深榮早晚緘書到唯聽新鴈聲送鄭主簿閶闔曉雲黃龍盤紫禁長小臣朝上國天子坐明堂名入郎官奏班隨奉禮將考功唐典故治行漢循良秋雨萊蕪甑春風召伯棠因君清似水挹彼當離觴十月一日從幸太平門閲武應制四海清無戰三農樂有秋元戎陳虎旅天子詔貙劉肅殺遵時令登臨展豫遊江山明組練海國壯貔貅旄鉞傳天語韜鈐稟廟謀射蛟應小漢搏獸已卑周佳氣投丹轂祥風轉采斿武功今已偹文德願兼修虛沗金鑾客元才詠大搜元日曉祀皇明嚴祀典大孝極尊親太室躬臨祼先陵復遣臣九重頒命曉一節渡江春豐沛真王地枌榆舊社民駿奔祗事早齋宿省躬頻殿闕風雲盛楸梧雨露新陳兵森虎豹清道表麒麟列岫天垂障長淮地湧紳潛光騰白璧盛德琢蒼珉閉匠嗟秦侈除瘐識漢仁玄堂存祕器玉座仰清塵億載靈如在元正禮再申加籩時物偹奉爼大牲陳祝嘏傳多祚餘膰及衆賔獻酬神惠浹醉飽聖恩均風雪催歸蓋江湖戀帝宸大郊期不逺言邁敢逡巡元夕錢塘懷古聞説蕭朝事今宵晝日同都人丹闕下天子綵樓中燈熖千枝月衣香百和風墜鈿隨步拾遊騎徹明通節物長年在豪華逝水空無因見遺老重問古行宫春雨軒霡霂灑空濛憑軒望不窮溫迷回鴈渚暖帶落花風著柳應催緑闕桃更上紅氣縈蛛網闕潤合燕泥融送響苔階上飄寒緑瑣中此時須下榻琴酌暫相同杏隱絳蕚競春華丹光照似霞虎眠應守榖鶯過每銜花望處疑仙島移來是病家寫方看子墜曝藥避隂遮山客留仁種貧人寄劵賖茂陵那解此徒説棗如瓜竹雨軒竹裏蕭蕭雨軒中景自幽明珠當砌落碧玉倚闌愁煙護常疑晚風隨鎮似秋響分絃上度色借畫中浮翠葉濡偏重瓊林著更柔羽霑餐實鳯衣濕在林鳩嶰谷隂時覔淇園暝處求青苔知漸厚緑霧覺添稠截管情何及題竿興未酬阮生宜徑造著屐與誰遊靜菴集卷三
