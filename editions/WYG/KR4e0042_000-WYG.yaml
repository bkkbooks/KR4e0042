body:
  text: 靜居集别集類五明提要臣等謹案靜居集四巻明張羽撰羽字來儀後以字行更字附鳳本潯陽人僑居呉興元末領鄉薦為安定書院山長再徙於呉洪武初徴授太常寺丞尋坐事竄嶺南未半道召還羽自知不免投龍江死明史文苑傳附載髙啟傳中史稱其文章精潔有法尤長於詩太祖重其文洪武十六年嘗自述滁陽王事令羽撰廟碑何喬逺名山藏亦稱其文詞典雅紀載行事詳而有體顧其詩名尤著故編集者亦僅錄其詩而文則未之及也朱彛尊靜志居詩話謂其五言微嫌鬰轖近體亦非所長頗不免於微詞今觀其集律詩意取俊逸誠多失之平熟五言古體低昂婉轉殊有瀏亮之作亦不盡如彛尊所云至於歌行筆力雄放音節諧暢足為一時之豪以之接跡青邱先驅北郭盧前王後之間亦未必遽作蜂腰矣乾隆四十五年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:613d2d3bee3763d3d9f726f8b835319e58ff350a54420a84fd4276c162d93c14
