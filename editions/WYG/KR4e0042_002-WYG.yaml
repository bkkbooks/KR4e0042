body:
  text: 靜菴集巻二明張羽撰七言古風樂府歌行長短句題沈氏宜春堂屏風徐給事賁所畫春雲萬嶂休文堂前花滿枝風物四時春更宜前年三月宴客時傳觴擊鼓但恨遲坐中才子姑蘇客衆裡翩翩好顔色醉来意氣為傾倒千里江山出胸臆夀屏十尺色且鮮千嶂萬嶂含春烟客子疑行㶚橋路人家似住武陵源山僧投寺亂松裏山下鳥啼人未起關門日出金瑣開雙堠平臨楚江水江水湘雲互蔽虧渚宫遥隔望霏㣲東崦晴垂西崦雨何處長歌樵子歸亭下流泉春浩浩上有居人往来道相過搃是看山人衣冠各别心事好主人愛説不下堂清晨掃地坐焚香晴日似見孤雲起莫對疑聞澗草芳夫君生平於我厚記得新詩長在口長干一去無尺書謾對此圖嗟妙手一行作吏此事廢從前闕癖今除否遥知紫陌紅塵下每為雲山一回首人生適意在盃酒浮雲萬事亦何有君乎何日歸去来雨裏青山待君久晝雲山歌我昔曾遊廬嶽頂欲上青天凌倒景山中白雲如白衣片片吹落春風影雲晶晶兮花𠖇𠖇萬壑送盡洪濤聲歘然置我滄海上金銀樓觀空中明上清真人咲迎客夜然桂枝煑白石手持鳯管呌雲開虎咆龍吟山月白明發邀我升東峯導以絳節䨇青童天雞先鳴海日出赤氣照耀金芙蓉屏風九疊花茸茸霧閣雲忩千萬重胡不置我丘壑中一朝折翅投樊籠空留萬片雲掛在清渡千丈之寒松愁来㺯翰北忩裡貌得雲山偶粗似遂令殘夢逐秋風一夜孤飛渡江水夢亦不可到圖亦不可傳不如早賦歸来篇仙之人兮待我旋安得齷齪塵埃間坐令白雲摧絶無與歸青山咲我凋朱顔寄生碧桃花歌少年慣作看花客陌上桃花搃相識春風一向此中偏一種花開千種色只愛深紅間淺紅君家此本更不同枝上白雲吹不散堦前明月照疑空一從一衡根各别香土斜封愁欲折西筵紅闕人半醉忽見此花驚是雪武陵秦人那得知河陽滿縣徒爾為當時春風千樹錦未比君家璚樹枝翠禽欲来愁易見蛺蝶栖時難可辨紅粧美人嬌如花着向花間應掩面花今正開鸎亂啼酒醒拈筆為君題羨君兄弟如虹蜺豪飲不愁花下迷玉壺清酒金偏提秦筝琵琶羌管齊走覓橋西舊酒闕莫待風雨花成泥題徐給事畫黃門給事三十餘面如紅玉少有鬚風骨豈是山澤癯問着只愛山中居前年版下鶴頭書徵起直上青雲衢文華堂高凌紫虗出入侍從陪金輿排方小帶紅羅襦精神宛如馮子都朝下手帖八尺殳左旋右轉風生軀有時自臂雙雕胡命中疊發爭讙呼歸来賔客滿直廬京城酒貴不住沽爛醉坐比蒼頭奴執燭冩此雲山圖方今臺閣多文儒似君才藝衆中無文官侍中武金吾不負堂堂美丈夫山中故人交不疎十年貧賤長相俱升沉忽如鳥如魚麋鹿豈與羣龍趨見君此畫長嗟吁關西行李今何如祝君名成歸五湖来尋高陽舊酒徒不辭解衣貰玉壺與君重醉黃公壚米南宫雲山歌古之畫法不復見六朝人物留遺譜後来山水出新意二李三王差可覩洪谷之後有關仝營丘渾雄獨造古華原處士筆竒崛餘子紛紛何足數郭熈平逺疑有神北苑爛漫皆天真畫院宣和衆史集俗筆姿媚非吾倫豈知南宫迥不羣一掃萬古丹青塵神閒筆簡意自足窈窕青山行白雲黃侯黃侯安得此元氣淋漓猶滿紙晴忩拂拭對髙秋恍惚神遊華山裏生平畫癖奈此何為子試作雲山歌珍藏什襲君須記世間名畫今無多題畫雲山圖余既為公衡作此圖公衡復求余詩其上遂為賦此時洪武丁已八月十九日也此畫遺逸在苕城前代何人畫山水長安關童營丘李華原特起范中立三子相望古莫比亦有北苑與河陽後来作者誰能當米家小虎出逸品力挽元氣歸蒼茫房山尚書初事米晚自名家稱絶美藝高一代誰頡頑只數吳興趙公子當時弭節匡廬峰曾冩太平興國之神宫五峯却立疑爭雄臺殿突兀分青紅中有雲氣如游龍我對此圖臥三日頓令竒氣生心胸亂来學士遭漂蕩文藝草草誰為工筆精墨妙心更苦安得再有前賢風嗚呼乾坤浩蕩江海濶使我執筆將安從寄題天目山房歌昔臥香爐頂闕觀山海圖東游擬拂華盖雲下瞰弱水窺蓬壺天公有目何不在天世傳寄在茲山顛兩泓碧水涵霜鏡炯如䨇曈落天邊天髙聽卑視亦宜然云有十二清虛之洞府珠宫貝闕不可睹靈風颯颯巻飛雨危石深林人上苦盤渦轉轂若雪山青天際際響天鼓龍藏其中是耶非但見神魚作人舞慎勿戱之逢彼怒頃刻滂沱淚下土前年南昌仙邀我望山雪神宫玉女待我来欲往從之路超越若人有仙骨居與洞府鄰雙童耕雲種瑶草石田自熟無冬春臥處烟霞飛枕席醉裡山花落酒巾松風蘿月朝復暮坐見麻姑白髮新我欲駕白鹿共子攀雲岑請天開兩目照我一片氷雪之清心但恐此目不司視如星有箕斗不可簸與斟且復臨澤潄金碧聽我長歌金石音不然倒却池中水釀作百斛之春酒共君酣醉臥雲林洪崖舉手或相接更結丹梯千萬尋為童文學題韓介玉畫我識河東老詞客鶴骨伶俜長八尺白頭徒步拾八侯人生變化誰能測將軍跋扈天為傾公持寸管力與爭當時直氣動朝野至今文采傳諸生諸生白面今已老三載漁官空闕倒罷歸百事無所為萬壑千岩恣揮掃丹丘𤣥圃落眼前澗水松風鳴浩浩由来絶藝出天機俗吏紛紛爭醜好吳興博士今鄭䖍故山未歸雪滿顛今年召對席屢前䝉恩親賜水衡錢歸来見畫心茫然拄杖欲問金華舡金華之洞小有天下與五嶽相鈎連初平鍊丹去成仙弟兄相隨風翩翩洞前白不如羊眠我欲訪之何由縁安得與子相周旋饑飡紫芝拾瑶草石上一咲三千年余將軍篆書榻本歌余將軍守舒州舒州之城大如礪長江西来遶城流賊舩如雲壓城硠將軍提劍坐城頭劔未動賊已奔鯨鯢蔽江江為渾孤軍六年二百戰王師不来城自存無兵猶與戰無食安可支豈無愛妾與愛馬殺之不解壯士饑力盡闕竭將奚為倉皇齚舌罵不已義士三千同日死只今猶有盡忠池碧血清泠化為水將軍持節東州時作此篆書形崛竒妙墨已隨神物化好事當時臨得之雖非其真意獨在埀金屈鉄蟠蛟螭我拜重是忠臣迹秦相雖古其人非嗚呼將軍此書配者誰請君摹取浯溪石上中興碑題徐士元畫夏木圖董元夏木不可見俗本紛紛何足觀徐郎筆力能扛鼎冩此千章生晝寒隂森似有神靈㑹偃蹇直作蛟螭蟠天雞曉鳴清籟發木客夜度雲旗翻林下文人行杖藜石根葉落失舊蹊孤童襆被向誰宿山風蕭蕭日薄西商岩紫芝復何有武陵桃花元易迷人間􅐓洞不可處莫畏虎嘯兼猿啼原作商顔紫芝不可食贈瘍醫宣氏長橋下壓蛟龍宫㟁上人家如鏡中道人賣藥臨溪水醫得青蛇是龍子報恩不受千金珠龍伯親傳海上書門前扶杖人如市妙術何愁三折臂燕支山前白草秋冷入金瘡淚欲流安得神丹從爾乞提携玉龍還向敵贈倭翁東夷来語嗢吚聖人當天九有服小臣螻蟻將安歸萬夫伐竹扶桑涘夜搗水苔成側理製為鵲尾扇參差再拜獻入金門裏君王垂衣坐法宫天飇闕清秋同尚方受獻應無用分頒徧與羣臣共朝下從容氷井臺人人襟袖南薰動倭翁来東夷平揚皇風四海清題遵道墨竹歌墨竹昉自何人始輞川石刻今餘幾後来蕭恱稍出羣香山侍郎獨稱美洋州太守善冩真長帽先生差可儗江南謾作金錯刀枝葉離竒何足齒北方作者誇澹游房山繼之妙莫比湖州公子最擅名同時亦數薊丘李薊丘有子能傳家筆勢翩翩此其是一竿玉立無因依風露淋漓猶滿紙想當塗洒發幽興靜對山僧北忩裏江湖無人老成盡百藝荒涼今已矣展圖三歎墨君堂秋聲滿座悲風起題沈御史所藏倪雲林竹并竹枝歌雲林之子有仙骨平生好潔如好色紛紛濁土等蟲沙嗚呼瓉也何由得憶昔常登清閟堂黃金寳鴨共焚香闕京妙墨僧繇畫示我不啻千明璫人間萬事如飛電洗玉池空人不見李子城東土一丘何人為著黔婁傳綉衣使者騎青􅔕曾聽竹枝湘水東歸来見此如夢寐巴陵洞庭生眼中江湖豪翰今零落君厚此圖良不薄愧我題詩憶故人黃雀何年下寥廓望太湖登髙丘望逺澤蓬莱三山不可測何如太湖緑萬頃洞庭連娟向空碧東風吹盡吳天雲玉盤雙螺翠堪摘我昔東游鳯凰臺嵯峨巨艑如山来白波不動鏡光曉雲㠶萬㸃爭先開中流回首心茫然恍如乗雲行九天驚濤忽逐迴風旋砰雷轉轂若雪山龍伯鬼國見眼前失勢一落充蛟涎舟師指浪呪浪婆我獨再拜不敢言平時之險且如此何况震蕩洪荒先帝堯咨嗟逾九年黃能無勲幽羽淵有子大聖與天同一朝出我羣魚中試觀此湖險始知四載功如何草木華無心謝春風吳越之事良可鄙虎戰龍爭方未巳水犀百萬今安在唯見夫差白雲裡鴟夷身退不言功不直湖中一杯水我欲臨流呌神禹湘娥鼓瑟馮夷舞盡挽湖波變春酒醉臥扁舟弄烟雨題胡廷暉畫畫師我識吳興胡身長八尺蒼髯鬚目光至老烟不枯藻繪萬象窮錙銖大兒十歲能操觚小兒五歲能含闕得錢不共酒家需時復縱博為歡娛魏公家藏摘𤓰圖妙筆不啻千明珠胡一見之神闕蘇以指畫肚潛臨摹落筆便與前人俱祝融撑空閣道孤朝雲暮雨相縈紆中天碧瓦仙人廬下有桃源風景殊雞犬似是先秦餘潯陽山客山澤癯自從䘮亂遭窮途幸逢治世容微軀堯舜亦有巢由徒已辦小艇長鬚奴便欲往從漁父漁江湖此境何地無趙文敏公家藏小李將軍摘𤓰圖歴代寳之嘗命廷暉全補之廷暉私記其筆意由此畫法大進故詩及之題青并雲林圖見前不復錄趙彦徵畫葵軒歌為金脩撰賦昔君種葵吳門東南風五月花茸茸年年走馬㸔花去君家有酒如花紅闕君種葵荆山下五月開花還遶舍㸔花對酒豈無人祗憶故人無在者種花人在未成翁何事㸔花人不同我亦當時㸔花者忽到花前如夢中握君手為君夀但願長㸔君花酌君酒驛船来驛舡来鼓如雷前舡去後舡催前舡後舡何敢住鋪陳惡時逢彼怒畫屏綉褥紅􅉊毺春夢漸醒過舡去棹即長跪勸使臣願官莫喜更莫嗔古来天地如郵傳送盡忩忩無限人梅花初月樓歌吾聞仙人好樓居乃在閬風之圃𤣥洲之墟雲窓霧閣千仭表青天十二金芙蕖風舟不可以逕度安能跨海騎鯨魚新安先生列仙儒卜居半生茅未誅曉携青鹿向烟霧一逕初入千縈紆桃源忽向眼中見風物但是秦人餘五丁何年斧鑿樞洞户夹立宁平舒紛紛過客不敢有山君守護煩呵嘘先生結樓萬木杪逈如麗譙雄且孤連峯忽斷西南隅開樓見月蛾眉初梅花千樹雪不如飛觴醉月㺯花影炯然身墮白玉壺侍郎結髪讀父書十年閉樓山不㸔一朝徵起青雲衢珮玉日向君門趍樓前梅花自開落樓頭明月還盈虗南忩孤燭照歸夢覺来枕席非吾廬且當致身佐唐虞䕫龍豈容混樵漁長干美酒熟可沽梅花如雪覆緑蕪神州月色天下殊何用區區懐故都花間臥月紅􅉊毺人生花月何處無題錢舜舉溪岸圖憶昔至元全盛日天子詔下徴遺逸吳興八俊皆竒才秀邸王孫稱第一一朝玉馬朝周去諸子聲名捴輝赫豈知錢郎節獨苦老作畫師頭雪白江南没骨傳闕稀錢郎得之法更竒晴忩㸃染弄顔色得錢沽酒不復疑今人祗知重花鳥豈識此圖奪天巧𤣥雲抱石雷雨垂蒼山夾水龍蛇遶㟁側溪迴共杳㝠蒲稗深沉映魚鳥漁舟乍隨迷烟散客子竟渡澄江曉自云布置師北苑只恐庸工未深了巻餘更有魏公題字擬鍾王差未老鄭侯得之恐神授使我一見喜絶倒雙溪流水清何極門外南山空黛色文章翰墨何代無二子疇能躡其跡為君題詩三歎息嗚呼古人難再得吳興當元初時有八俊之目以子昂為稱首而舜舉亦與焉至元中子昻被薦入朝諸公往往相攀附取宦逹而舜舉獨齟齬不合流連詩酒以終其身故二公之詩各言其志而子昻微風有意覽者當自得之也題陳昇畫馬開元之中馬獨盛秦漢以来難及之豈惟監牧効才藝畫史往往稱神竒拳毛玉花最難冩祗許曽羈名當時亦有弟子沙苑丞不解骨法空毛皮近代吳興趙公子雍也其子名相馳後来陳昇號入寳昇今已老繼者誰青桐颯颯凉風吹奚官朝出試馬時前者迴顧後者隨精神不動鬃毛垂唐家四十三萬匹如此駿骨亦恐稀嗚呼世間駑駘方滿地安得覩此真龍姿題徐士元所畫闕面營丘老山百世師後来學者有郭熈寒林平逺世豈有往往贋本傳其疑吳興徐卿好心手貎得郭熈定真否二三野人長松下茅屋正對青山口前者迴顧後者恭抱琴傴僂隨孤童世間豈復有此輩定是栗里柴桑翁請君更試虎頭筆為冩我象叅其中題幼文為費景祥冩古蕭山寺圖山人手持酒一巵長跪向我求新詩自言此闕君所識乃是河南使君之所為闕厓怒瀑形絶竒天門閣道相因依中有臺殿橫天梯金繩碧瓦光參差使君當年作此時祗是昻藏一布衣豪雄意氣今已闕圖畫應知得者稀右丞輞川不易得此公名位豈卑微請語世上悠悠者人生貧賤安可欺人生貧賤安可欺潯陽張羽為景祥題是日積雨新霽風日清美余與野得黃君公衡沈君携酒會飲其家酒酣耳熱率爾賦此不能工也畫山水行題沈子幹所藏趙待制江浦歸㠶秋林瀟洒二圖古来名畫傳父子唐有二李蜀兩黃吳興公子冠當代雍也繼之早擅塲太祖子孫盡龍種毛骨固是非尋常珊瑚寳玦久零落空有妙藝傳文章至元天子親召見徒步便賜中書郎奏園每得天顔喜盛以金匱白玉堂遂令世人爭貴重門户雜遝如堵墻雍初騰踔晚一闕五陵豪氣無時忘吳姬越艶坐相擁始闕落華揮縑緗五日十日一水石屏障彷彿生輝光君家雙圖何所得私印乃出牟陵陽一圖汗漫秋水濶客子喜甚髙㠶張山僧暝投雲際寺殿影洸漾涵瀟湘一圖崒峛孤峯起空林葉赤天已霜蹇驢烏帽喜蕭散佀是漢代綺與黃風塵澒洞二十載錦題玉軸多散亡圖書祗應天上有人間那得千金藏從来好事多成闕雲闕過眼如毫芒君不見王家相家勢盡時複墻走軻不得將何如城南佳山水千崖萬壑摩青蒼與君對此飲美酒雖無南宫北苑吾何傷題姚運使冩谿山仙舘圖歌去年君為郡文學獨抱遺經憎命薄出門無馬坐無氊拜迎官長常作惡今年君為轉運使殊恩親出官家賜月給太倉三十斛况復官閒少公事人生貴賤翻覆間世上悠悠那解此憶昨訪我當嚴冬冩此谿山三數重驊騮一去了無影空有遺跡泥沙中閒道河間古城郭出門遥見滹沱水何如為畫古邯鄲珍重函封寄千里去年冬姚君繼華過予戴山寓舍會飲順徳堂為仲倫冩此圖今年春遂為文學徵除河間運使秋八月張羽賦此題唐子華雲山歌國朝畫品誰第一房山尚書趙公子二公何以能絶倫丘壑乃自胸中起由来書畫搃心畫政自不在丹青裏當時豈無劉與商屏障紛綸何足齒唐侯自是吳興秀愛畫彷彿郭與李長松平逺早已工更上歙州㸔山水歸来却師董北苑叅以房山勢莫比始知絶藝老更成畫師俗輩那知此此圖三尺誰為贈雲氣蒼茫石磈磊牛羊未歸樵子出户牖寥落蒼崖底冩成不題歲月字要是頭白居鄉里乾坤浩蕩江海空後人未續前人死為君題詩三歎息世上好手今餘幾鳴呼尚書公子不復見得見唐侯斯可矣題王元章墨梅王郎志竒貎亦竒與世落落噤莫施一朝騎牛入都市關吏不識誰何之歸来老作會稽客千戈歘起西南陲青袍白馬風塵裡越州城邊戰不已雄襟自許魯仲連一箭無成身已死世上空餘冩墨花只將名姓華光比嗚呼人生有才不盡用古来埋没皆如此題便面近代丹青誰第一南有魏公北有髙風流雄混各臻致下視劉商兒女曹百年零落作者少大夫文藝供草草山川英氣何代無我縂有心嗟欲老君不見房山翁曾冩太平興國宫五峯秀出青芙蓉雲氣鬱鬱如游龍千金拱璧不可博一朝焚棄隨飄風世間神物久已化紛紛粉墨何由工嗚呼乾坤浩蕩江海濶使我執筆將安從使我執筆將安從趙魏公竹枝歌趙魏公真王孫風流闕晳更能文丹青自比董北苑書法兼工王右軍至元詔書徵草澤召見庭中推第一三事趍朝賀得人萬乗臨軒賜顔色殿前落筆侍臣驚雞林象郡搃知名夫人通籍宫中宴兒子承恩内裏行一家三人書総好天子頻稱古来少疏廣歸来有賜金張芝閒處多章草全盛須臾那可論百年喬木縂成塵凄凉故邸屬官府零落諸孫隨市人空留遺迹傳身後一紙千金爭買取屛風畫絶為誰收團扇書工亦何有唐生購得墨竹枝一尺中含千尺姿若非松雪齋前見應是鷗波亭下池曲池已平臺已壊露葉烟樷更何在唯有雙溪水北流至今猶遶空墻外題胡廷暉畫近代丹青誰第一精絶獨數吳興胡魏公家傳摘𤓰圖將軍妙筆絶代無年深粉墨紛糢糊公命胡也全其汙鷗波亭前山滿湖賔客不来人跡疎以手畫肚私傳摹歸来三日神始甦下筆直與前人俱今人不見古人畫古畫自與今人殊嗚呼眼前不復見此物吾與購之千明珠送沈孝亷讀書山中秋空雨洗千峯出霜樹遶谷攅青紅嗟我欲游不可得子住讀書於其中念子出身自紈綺秀如青松茁蒿蓬十年奔走鎩羽翮黃金散盡家已空懐中一經不敢棄失此將恐為昏聾束書堂上告父母深山獨往無僕童林僧谷叟頗敬客麤床糲食意甚忠身閒晝靜百事絶經史左右相研攻逕須跨海踏鯨背且莫𤨏屑牋魚蟲車良路端期不止跬步自可升華嵩業成靜俟時自至譬彼力稼遭年豐朝廷懸爵待竒雋掇取五鼎榮而公古来孝悌神所相未必使子羸其躬蹇予少學壯愈惰聪明日闕髩已翁世間有書未盡讀安得返老還為童跛鱉何由追騄耳贈子以策情何窮倘有新知逺相教為我緘寄東飛鴻長洲行送黃茂宰之官長洲昔我揚㠶向東海弔古直上姑蘇臺洞庭水樹净如髮一片吳江天際来長洲逶迤覆緑水金沙蕩漾闕光起不見夫差蕩槳歸空有芍藥似西子閶門大道多酒樓美人如雪樓上頭争唱吳歌送吳酒玉盤纎手進氷羞勸人但飲不須愁伍員吹簫去國成名鴟夷一去流恨無聲要離已矣髙墳崢嶸樵兒躑躅芳草春生何如三讓人孤名如水清亦有掛劍翁生死見交情薄俗輕然諾乾坤長戰爭兩賢不可作令我淚沾纓君發金陵臘未殘君到吳門春已還邑人訟少清且閒還同謝眺㸔青山開元寺裏題詩處訪我舊墨蒼苔間倘過臯橋煩借問恐有高人梁伯鸞題丘大卿天柱峯昔聞安期生飄飄入秦京上書三月初報罷拂袖去作蓬莱行却咲叔孫通俯仰咸陽城長生亦何補身後留空名何似長安少年客天柱峯頭煑白石朝辭猿鶴下雲中莫逐䕫龍侍君側綉衣騎􅔕馬蹀􅉜臺城下愛道心不忘歸来坐清夜太平天子親亝祭新擢祠官捧珪幣紫壇爟火曉如星獨倚衮衣朝上帝翻思舊隠地石室生青苔来時壁上蒼精劍七星剥落空塵埃丹砂不復化羅衣誰更裁人生窮逹㑹有命何須千歲如童孩草衣木食苦復苦王喬偓佺安在哉寄語空山舊泉石不須為我生悲哀功成倘遂乞身願萬里青天騎鳯来題赤城霞圖贈方生結髪好名山遨遊到吳楚東遊不到天台路長憶興公賦中語赤城煥髙霞翩然空中舉靈溪碧草春萋萋瀑水和風響秋雨我欲振金策飄飄凌九垓游神不死庭迴光增天臺手招丹丘人共臥石上苔紅顔去人不願返老大求仙嗟已晚方生去愁人心贈生赤城圖吟我赤城吟勞勞亭下一盃酒離愁萬里生林隂客車明日當早發雲㠶孤飛度東越國清寺前千尺松歲晚應歸望山雪道逢寒山子為寄相思情未歇山人若欲知我心五界峯頭㸔明月題山泉隠居圖日長侍立南薰殿聖主從容正開巻内臣如闕擁圖書詔許近前曾一見玉􅉜金題照眼新三王二李闕未陳妙筆森芒洄𠖇漠乃知今人非古人歸来三歎北忩下開屏見此新圖畫流淙百折挂石梁古木寒松勢相亞木末何人一草廬山泉之人昔所居鴻臚寺裏晚朝下對此高堂心鬱紆華亭御湖眼中見武陵桃源路豈殊老夫曽住康王谷五老香爐映飛瀑亂来井臼今存否因爾高歌望黄鵠日上人深居菴古槐僧古槐僧何處深居白雲裏禪心乍可擬虚空世事都將等流水長年禁足不辭山一日化衣曾入市閒分碧澗浸楊枝􅃧采青松為麈尾忩間啼鳥寂不聞掌上闕珠聊渡爾尚嫌宿習除詩句況肯勞生為妻子古槐僧誰得似松下問童圖宣和天子開南苑畫史當時皆妙選王孫公族縂好此精絶誰知趙希逺君不見開元之中世稱文宗室亦有李將軍希逺師之得其妙思陵寳重闕千鈞松下何人白練裙蕭散似是華陽君展圖安得從爾去相侔吹笙臥白雲題髙尚書山水君家此畫何由得峭壁隂森如鉄色髙閣平臨烟霧低長松闕舍雷雨黑寒綃七尺半是雲深林窈窕路莫分幽尋恐與神明遇靜聽唯應猿狖聞海岳者圖絶低小後来作者何足云主人借問誰能爾定是房山髙使君望雲樹遊子辭親下江去東遊直到海邊住水路迢遥難寄書空望白雲知母處駱駝橋下賈舡稀吳緍日日得歸遲舉頭見雲低頭坐此意傍人那得知焚香再拜雲中君願留阿母待兒身奉化李公復祖母沈年二十生子七月而寡子既長沈為娶兄之女為婦生二子亦寡長公逹次即公復二母今皆已老號雙節堂鳯觜鸞膠難續絃雙龍鏡破難再圓阿婆二十已守節新婦喪夫方少年大兒嬌啼母心苦小兒十月安知父破忩風雨来早秋夜績燈前共相語山頭松栢摧為薪山前翁仲二成塵紅顔憔悴垂白髮生死不慚泉下人題叔耕畫梅雪軒好畫誰如莘棗強墮馬折股猶未忘何年冩此寒林趣精絶未數左子王屋裏何人坐吹笛似是南昌郡中客曲終朔雪忽飛来開門滿樹梅花白松隂清梦圖陽坡碧草秋芊綿疎影墮衣團緑烟龍枝無聲山日年仙骨空明神悄然氷魂微回海山小泠泠鶴語青林表俯視黃塵蓋九州悠悠凡夢何時曉百索詞越羅窄袖香如雪五色絲茸相鬭結㸔誰結得絲最長管取自身無口舌大姑巧擘松紋細小姑雙盤作人字揎来只依金釧寛賸得留將繫郎臂繫郎臂結郎心一寸絲繩一寸金愛惜莫教容易斷直到明年與郎換吳宫詞擬王建題胡廷暉所畫春景樓觀士女圖舘娃宫中百花開西施曉上姑蘇臺霞裾翠袂當空舉身輕似欲隨風去遥望三江水一盃兩㸃微落洞庭樹轉面凝眸未肯回要見君王射麋處城頭落日欲棲鴉下臺􅃧折棠梨花隔岸行人莫偷盼干將莫邪光燦燦楚宫詞擬張籍題夏景渚宫四面芙蓉開碧水晴徑氷井臺玉壺蔗漿光滿滿當晝君王頻賜来雲綃半巻凉欲滑援琴向風彈白雪冷玉屏風十指寒輸却鸞篦戱相奪吳綾畫扇鎮長新肯信年年有炎熱不願生入蓬莱峯願妾世世居王宫秦宫詞擬李賀題秋景涼波翠濕南山影露滴金人光炯炯秦王夜半巻衣回樓壁斜開蜀雲冷西宫桂熟離離子海童不歸一塵起蛄啼老石不勝秋小玉㺯香惜香死臙脂影破澄潭白菱角尖尖不堪摘鮮紅皴緑未滿舡樓前凉兎光團團漢宫詞擬温庭筠題冬景石鯨呿浪揺金池吹盡宫梅如雪枝避風臺髙風不到寳帳熟眠人未知象爐紅熾狻猊影氍毹軟翠鴛鴦並李娘喚春春為回咲却人間求火井椒房小妓起常先玉缾暖手濯温泉白頭臣朔寒無履待詔金門霜滿天送金秀才歸侍以貞風吹歴陽樹石城悲早秋髙堂入逺夢拂袖登吳舟金陵官酒如乳香酌君送君朱雀航前日同来二三伴此時望君俱斷腸科名古来人未羨冨貴不如歸故鄉年年隨計多辛苦十上風塵竟何補秋巻忩將箧内歸彩衣重着階前舞當時縣令親勸行今日還家父老迎門外清溪仍可釣山下石田身自耕子身長健親長在黃金如山不可買君不見長安城中罷官客欲作布衣何可得欲一作求吳節婦詞赤塵曉擁青絲騎玉鏡愁鸞落紅淚氷魂偷逐水仙歸綺樓一夜靈犀碎六曲䦨空不碍春帶羅盤風輕颺塵池波不動暮光碧青天影落桃花雲相思月照樓前水離離芳樹留紅子無情桃李亂中開不學夫容抱霜死與徐徳望冩扇上南州髙士忽相見求我為畫白團扇戱拈秃筆掃雲山頃刻終南眼中見昨夜西風起天末坐使清涼奪炎熱勸君此扇莫棄捐不用留取待明年守宫詞鈿合和丹食龍子臙脂夜凝神血紫老蟾玉杵寒丁東鸞尾輕輕飛碎紅織成窮袴千盤帶蝶粉蜂黃鎮長在夭桃一㸃老晴春門前魚目深如海杏林圖山人種杏白雲中谷口花開千樹紅自惜朦朧帶朝露莫愁零落向春風春風幾度花開日煉得丹成應可食妙年有術濟人多况君自是飡霞客雲山圖青山青青白雲白一尺小溪千里客扁舟艤岸不見人雞聲何處秦人宅桃花流水春鱗鱗不識人間有戰塵待得紫芝如掌大歸来閒作太平民題金華王氏潔養堂金華之山何岧嶤上有樓觀當雲霄仙人時跨綵鸞下夜靜月明吹玉簫丹厓翠壁饒烟霧正是初平牧羊處初平一去已千春白石于今尚如故君因采藥時經過嫋嫋涼飇生薜蘿洞口雨餘蒼蘚合松間秋晚白雲多幽徑閒行不辭逺泠泠碧澗流常滿赤松来往此巖中曾見蓬莱幾清淺有時髙咏獨歸来迴看明月上仙臺瑶草無聲露華濕天風拂袖吟懐開聞道君家景殊絶南山有花如白雪兄弟相規侍母前兒身常比花同潔花謝花開春復秋悠悠世事隨東流惟有高堂風物在開門長對南山幽八珍美味非所欲菽水奉親歡不足但願棲遲勿逺游歲歲相依在林麓君不見西家輕薄兒身隨賈客游天涯挂㠶東去入滄海風濤洶湧無歸期又不見南隣少年游侠客遥遥走馬天西極幾時販得黄金歸愁来應洒窮途泣人生忠孝當兩全事親且復終天年還須奮身佐明主留取聲名照千古靜菴集巻二
